<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Middleman - Dynasty Family's</title>
    <style>
        :root { --primary: #ff8c00; --bg: #050a18; --card: #0d1426; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(255, 140, 0, 0.05), transparent 70%); pointer-events: none; }

        .header { text-align: center; margin: 40px 0; z-index: 1; padding: 0 15px; }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); box-shadow: 0 0 30px rgba(255, 140, 0, 0.4); margin-bottom: 20px; }
        .title { color: var(--primary); font-size: 2.2rem; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -1px; margin: 0; text-shadow: 0 0 20px rgba(255, 140, 0, 0.2); }
        .subtitle { color: #94a3b8; font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }

        .exam-card { width: 90%; max-width: 850px; background: var(--card); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); padding: clamp(25px, 5%, 50px); position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.6); margin-bottom: 50px; box-sizing: border-box; }
        
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 40px; position: relative; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px var(--primary); }

        .step { display: none; }
        .step.active { display: block; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .q-label { color: var(--primary); font-weight: 900; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        .q-text { font-size: clamp(1.1rem, 4vw, 1.35rem); font-weight: 700; margin-bottom: 30px; line-height: 1.5; color: #f8fafc; }
        
        textarea { width: 100%; height: 250px; background: rgba(0, 0, 0, 0.3); border: 2px solid rgba(255,255,255,0.05); border-radius: 12px; color: white; padding: 25px; font-size: 1.1rem; box-sizing: border-box; resize: none; transition: 0.3s; outline: none; }
        textarea:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.5); }

        .nav-btns { display: flex; gap: 15px; margin-top: 30px; }
        .btn-next { flex: 2; background: var(--primary); color: #000; border: none; padding: 22px; border-radius: 12px; font-size: 1.15rem; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
        .btn-prev { flex: 1; background: rgba(255,255,255,0.05); color: #fff; border: none; padding: 22px; border-radius: 12px; font-size: 1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; display: none; }
        
        .btn-next:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255, 140, 0, 0.4); }
        .btn-prev:hover { background: rgba(255,255,255,0.1); }
        
        .footer-link { color: rgba(255,255,255,0.2); text-decoration: none; font-size: 0.8rem; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo">
        <h1 class="title">CANDIDATURE MIDDLEMAN</h1>
        <div class="subtitle">DYNASTY FAMILY'S • BLOX FRUITS SPECIALIST</div>
    </div>

    <div class="exam-card">
        <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
        <form action="https://api.web3forms.com/submit" method="POST" id="form">
            <input type="hidden" name="access_key" value="a8ed2428-2741-474c-82f8-1c5444211509">
            <input type="hidden" name="subject" value="Nouveau Dossier Middleman - Blox Fruits">
            <input type="checkbox" name="botcheck" style="display: none;">
            <input type="hidden" name="Pseudo" id="hid-user">
            
            <div id="container"></div>

            <div class="nav-btns">
                <button type="button" class="btn-prev" id="prevBtn" onclick="move(-1)">RETOUR</button>
                <button type="button" class="btn-next" id="nextBtn" onclick="move(1)">SUIVANT</button>
            </div>
        </form>
    </div>

    <a href="hub.html" class="footer-link">Quitter l'examen</a>

    <script>
        const questions = [
            { cat: "Infos", q: "Disponibilités précises (heures/jours) :" },
            { cat: "Infos", q: "Depuis combien de temps joues-tu à Blox Fruits ? Donne ton niveau actuel :" },
            { cat: "Expertise", q: "Évalue ta connaissance des valeurs de fruits/items (/10) et explique pourquoi :" },
            { cat: "Théorie", q: "Explique précisément le rôle d’un Middleman et ses responsabilités (réponse détaillée obligatoire) :" },
            { cat: "Sécurité", q: "Décris étape par étape comment tu sécurises un trade entre deux joueurs :" },
            { cat: "Cas Pratiques", q: "Que fais-tu si :\n• un joueur refuse d’envoyer en premier ?\n• un conflit éclate ?\n• un joueur t’accuse de scam sans preuve ?\n• un ami te demande de le favoriser ?" },
            { cat: "Intégrité", q: "Si quelqu’un te propose Robux/Nitro/argent pour tricher, quelle est ta réaction ?" },
            { cat: "Expérience", q: "As-tu déjà géré des responsabilités (staff, modération, middleman, gestion de communauté) ? Donne des preuves si possible :" },
            { cat: "Confiance", q: "Comment comptes-tu prouver ta fiabilité et ta transparence aux membres ?" },
            { cat: "Sanctions", q: "Que risques-tu si tu abuses de tes permissions ? (explique les sanctions possibles)" },
            { cat: "Aptitudes", q: "Es-tu capable de :\n• rester 100% neutre\n• refuser tes amis\n• suivre strictement les ordres du staff\n• enregistrer ou prendre des preuves des trades\n• accepter un retrait immédiat du rôle sans discussion\n\n(Oui / Non pour chaque point)" },
            { cat: "Motivation", q: "Pourquoi devrions-nous te choisir toi plutôt qu’un autre candidat ?" },
            { cat: "Conditions", q: "Toute tentative de mensonge, favoritisme ou scam entraînera un ban définitif. Acceptes-tu cette condition ? (Oui / Non)" },
            { cat: "Pression", q: "Comment gères-tu le stress ou la pression quand plusieurs joueurs te pressent en même temps ?" },
            { cat: "Transparence", q: "Es-tu à l’aise pour enregistrer tes trades (screens/vidéos) pour la transparence ?" },
            { cat: "Inter-Staff", q: "Que ferais-tu si un autre middleman ne respecte pas les règles ?" },
            { cat: "Profil", q: "Selon toi, quelles qualités sont OBLIGATOIRES pour être un bon middleman ?" },
            { cat: "Règles", q: "Si tu es inactif plusieurs jours, que dois-tu faire ?" },
            { cat: "Engagement", q: "Acceptes-tu que le rôle puisse t’être retiré sans préavis en cas de doute sur ta fiabilité ?" },
            { cat: "Motivation Finale", q: "Pourquoi souhaites-tu vraiment ce rôle ? (motivation sérieuse uniquement)" }
        ];

        document.getElementById('hid-user').value = localStorage.getItem('user') || "Anonyme";
        const cont = document.getElementById('container');
        
        questions.forEach((item, i) => {
            cont.innerHTML += `<div class="step">
                <span class="q-label">${item.cat.toUpperCase()} — QUESTION ${i+1} / ${questions.length}</span>
                <div class="q-text">${item.q.replace(/\n/g, '<br>')}</div>
                <textarea name="MM_Q${i+1}" placeholder="Ta réponse ici..." required></textarea>
            </div>`;
        });

        let current = 0;
        const steps = document.querySelectorAll('.step');
        
        function show(idx) {
            steps.forEach((s, i) => s.classList.toggle('active', i === idx));
            document.getElementById('bar').style.width = ((idx + 1) / steps.length) * 100 + "%";
            document.getElementById('prevBtn').style.display = idx === 0 ? "none" : "block";
            document.getElementById('nextBtn').innerText = idx === steps.length - 1 ? 'SOUMETTRE MON DOSSIER' : 'SUIVANT';
        }

        function move(n) {
            if (n === 1 && !steps[current].querySelector('textarea').value.trim()) {
                return alert("Veuillez répondre à la question pour continuer.");
            }
            current += n;
            if (current >= steps.length) {
                document.getElementById('form').submit();
            } else {
                show(current);
            }
        }
        show(0);
    </script>
</body>
</html>
