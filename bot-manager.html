<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Bot Manager - Dynasty Family's</title>
    <style>
        /* ESTHÉTIQUE BASÉE SUR TES CAPTURES */
        body {
            margin: 0;
            padding: 0;
            background-color: #050a18; 
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 40px);
            background-size: 400px 400px, 250px 250px;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* HEADER */
        .logo-main {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #ff8c00;
            box-shadow: 0 0 25px rgba(255, 140, 0, 0.5);
            margin-bottom: 15px;
            object-fit: cover;
        }

        .main-title {
            color: #ff8c00;
            font-style: italic;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 2rem;
            margin: 5px 0;
        }

        /* CARTE & PROGRESSION */
        .glass-card {
            width: 100%;
            max-width: 800px;
            background: rgba(13, 20, 38, 0.95);
            border: 1px solid rgba(255, 140, 0, 0.2);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        .progress-container {
            width: 100%;
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .progress-bar {
            height: 100%;
            background: #ff8c00;
            width: 0%;
            transition: 0.4s;
            box-shadow: 0 0 10px #ff8c00;
        }

        /* SYSTÈME D'ÉTAPES */
        .step { display: none; animation: fadeIn 0.4s ease; text-align: left; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .question-num { color: #ff8c00; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .question-text { font-size: 1.2rem; line-height: 1.6; margin-bottom: 25px; font-weight: 600; color: #f3f4f6; }

        textarea {
            width: 100%;
            min-height: 200px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            padding: 20px;
            font-family: inherit;
            font-size: 1.05rem;
            resize: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        textarea:focus { outline: none; border-color: #ff8c00; background: rgba(0, 0, 0, 0.6); }

        /* BOUTONS */
        .nav-btns { display: flex; justify-content: space-between; margin-top: 30px; gap: 15px; }
        .btn-nav { padding: 15px 30px; border-radius: 8px; font-weight: 900; cursor: pointer; transition: 0.3s; border: none; text-transform: uppercase; font-size: 0.9rem; }
        .btn-prev { background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
        .btn-next { background: #ff8c00; color: #000; flex-grow: 1; }
        .btn-next:hover { box-shadow: 0 0 20px rgba(255, 140, 0, 0.4); transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo-main">
        <h1 class="main-title">Examen Bot Manager</h1>
        <p style="color: #ff8c00; margin-bottom: 30px; font-weight: bold; letter-spacing: 1px;">DYNASTY FAMILY'S RECRUTEMENT</p>

        <div class="glass-card">
            <div class="progress-container"><div class="progress-bar" id="progress"></div></div>

            <form action="https://formspree.io/f/xnjbrvez" method="POST" id="exam-form">
                <input type="hidden" name="Pseudo_Discord" id="hidden-pseudo">
                <input type="hidden" name="Poste" value="Bot Manager">

                <div id="steps-container">
                    </div>

                <div class="nav-btns">
                    <button type="button" class="btn-nav btn-prev" id="prevBtn" onclick="changeStep(-1)" style="visibility: hidden;">Précédent</button>
                    <button type="button" class="btn-nav btn-next" id="nextBtn" onclick="changeStep(1)">Commencer l'examen</button>
                </div>
            </form>
        </div>
        <a href="hub.html" style="color: #64748b; text-decoration: none; margin-top: 20px; font-size: 0.8rem;">Quitter l'examen</a>
    </div>

    <script>
        const questions = [
            "Analyse comparativement une architecture self-hosted, cloud-managed et serverless pour un bot Discord. Discute des implications en matière de latence, scalabilité horizontale, résilience et coûts d’exploitation.",
            "Explique les différences fondamentales entre : Gateway Intents privilégiés, Webhooks, Slash Commands (Interactions API). Dans quels contextes privilégierais-tu chacun ?",
            "Décris le cycle de vie complet d’un bot Discord depuis l’authentification OAuth2 jusqu’au traitement d’un événement (event dispatch → handler → réponse).",
            "Quels sont les risques liés au stockage local d’un token bot ? Propose une architecture sécurisée pour la gestion des secrets (ex : variables d’environnement chiffrées, vault, rotation de token).",
            "Analyse le principe du Least Privilege (Moindre Privilège) dans le contexte d’un bot Discord. Comment l’implémenter concrètement ?",
            "Détaille les permissions pouvant provoquer une compromission massive du serveur si mal configurées (ex : Manage Roles, Administrator, Manage Webhooks…). Explique les scénarios d’attaque possibles.",
            "Comment protéger un bot contre : Injection de commandes, Escalade de privilèges, Spam API / Rate limit abuse, Exploitation via faille dans une dépendance NPM/PyPI.",
            "Propose un protocole de prévention anti-raid intégrant : Détection comportementale, Limitation de fréquence (rate limiting), Journalisation automatisée, Mode lockdown dynamique.",
            "Un bot critique tombe en panne durant un raid actif. Décris un plan de continuité opérationnelle (PCA) structuré en trois phases : urgence immédiate – stabilisation – restauration complète.",
            "Comment implémenterais-tu un système de failover automatique pour garantir une haute disponibilité (HA) ?",
            "Décris une méthode de monitoring proactive (logs centralisés, alertes webhook, uptime monitoring, métriques CPU/RAM).",
            "Un bot commence à exécuter des actions imprévues sans modification récente du code. Quelle serait ta démarche d’audit technique ?",
            "Deux bots entrent en conflit à cause d’un préfixe identique ou d’événements redondants. Explique comment diagnostiquer précisément la source du conflit.",
            "Comment éviter les collisions de permissions lorsque plusieurs bots gèrent les rôles automatiquement ?",
            "Un bot mute accidentellement un administrateur à cause d’un mauvais algorithme de détection. Analyse les failles de conception qui ont permis cette erreur.",
            "Explique la différence entre une architecture monolithique et modulaire pour un bot. Laquelle privilégierais-tu pour un serveur à forte croissance ?",
            "Comment optimiser un bot pour réduire la consommation mémoire et éviter les memory leaks ?",
            "Quels sont les avantages et inconvénients d’un stockage : JSON local, Base SQL, Base NoSQL, Redis cache ?",
            "Comment implémenter un système de permissions hiérarchique interne au bot indépendant des rôles Discord ?",
            "Dans quels cas justifierais-tu la création d’un bot propriétaire plutôt que l’utilisation d’un bot public reconnu ?",
            "Comment évaluer la fiabilité d’un bot public avant de l’ajouter au serveur ?",
            "Quelle serait ta politique concernant l’attribution du rôle Administrateur à un bot ? Donne une réponse argumentée, technique et sécuritaire.",
            "ÉTUDE DE CAS : Ton serveur de 15 000 membres subit un raid coordonné, une tentative d’exploitation d’un bot et une saturation API. Décris ta stratégie complète."
        ];

        const container = document.getElementById('steps-container');
        document.getElementById('hidden-pseudo').value = localStorage.getItem('user') || "Anonyme";

        // Générer les questions
        questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'step';
            div.innerHTML = `
                <span class="question-num">Question ${i + 1} / ${questions.length}</span>
                <div class="question-text">${q}</div>
                <textarea name="reponse_q${i+1}" placeholder="Réponse détaillée..." required></textarea>
            `;
            container.appendChild(div);
        });

        let currentStep = -1;
        const steps = document.querySelectorAll('.step');

        function changeStep(n) {
            if (n === 1 && currentStep >= 0) {
                const area = steps[currentStep].querySelector('textarea');
                if (!area.value.trim()) { alert("Merci de répondre à la question."); return; }
            }

            if (currentStep >= 0) steps[currentStep].classList.remove('active');
            currentStep += n;

            if (currentStep >= steps.length) {
                document.getElementById('exam-form').submit();
                return;
            }

            steps[currentStep].classList.add('active');
            updateUI();
        }

        function updateUI() {
            const progress = ((currentStep + 1) / steps.length) * 100;
            document.getElementById('progress').style.width = progress + "%";
            document.getElementById('prevBtn').style.visibility = currentStep > 0 ? 'visible' : 'hidden';
            document.getElementById('nextBtn').innerText = currentStep === steps.length - 1 ? "Envoyer l'examen" : (currentStep === -1 ? "Démarrer" : "Suivant");
            if(currentStep === -1) changeStep(1);
        }
        updateUI();
    </script>
</body>
</html>
