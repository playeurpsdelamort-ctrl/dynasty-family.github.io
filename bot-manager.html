<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Expert Bot Manager - Dynasty Family's</title>
    <style>
        body { margin: 0; background: #050a18; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .header { text-align: center; margin-bottom: 40px; }
        .logo { width: 80px; border-radius: 50%; border: 2px solid #ff8c00; }
        .title { color: #ff8c00; font-style: italic; text-transform: uppercase; margin-top: 10px; font-size: 24px; letter-spacing: 2px; }
        .exam-card { width: 950px; background: rgba(13, 20, 38, 0.95); border-radius: 15px; border: 1px solid #ff8c00; padding: 60px; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .progress-bar { position: absolute; top: 0; left: 0; height: 5px; background: linear-gradient(to right, #ff8c00, #ff5500); width: 0%; transition: 0.4s; }
        .step { display: none; }
        .step.active { display: block; }
        .category { color: #ff8c00; text-transform: uppercase; font-size: 12px; font-weight: 900; margin-bottom: 10px; }
        .question-text { font-size: 20px; margin-bottom: 30px; font-weight: bold; line-height: 1.5; border-left: 5px solid #ff8c00; padding-left: 15px; }
        textarea { width: 100%; height: 350px; background: rgba(0,0,0,0.5); border: 1px solid #444; border-radius: 5px; color: #fff; padding: 25px; font-size: 18px; box-sizing: border-box; resize: none; }
        .nav-btns { margin-top: 40px; display: flex; justify-content: space-between; }
        .btn { padding: 20px 60px; border-radius: 5px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-next { background: #ff8c00; color: #000; }
        .btn-prev { background: #111; color: #666; }
    </style>
</head>
<body>
    <div class="header"><img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo"><div class="title">Expert Bot Manager Examination</div></div>
    <div class="exam-card">
        <div class="progress-bar" id="bar"></div>
        <form action="https://formspree.io/f/xnjbrvez" method="POST" id="form">
            <input type="hidden" name="Pseudo" id="hid-user"><input type="hidden" name="Poste" value="Bot Manager Expert">
            <div id="container"></div>
            <div class="nav-btns">
                <button type="button" class="btn btn-prev" id="prev" onclick="move(-1)">Précédent</button>
                <button type="button" class="btn btn-next" id="next" onclick="move(1)">Suivant</button>
            </div>
        </form>
    </div>
    <script>
        const questions = [
            "Analyse comparativement une architecture self-hosted, cloud-managed et serverless pour un bot Discord. Latence, scalabilité, résilience et coûts ?",
            "Différences fondamentales entre Gateway Intents, Webhooks et Slash Commands. Contextes ?",
            "Cycle de vie complet d’un bot : OAuth2 -> Event dispatch -> Handler -> Réponse.",
            "Risques du stockage local d’un token ? Propose une architecture sécurisée (variables chiffrées, vault).",
            "Principe du Least Privilege sur Discord. Comment l'implémenter ?",
            "Permissions critiques (Manage Roles, Admin, etc.). Scénarios d’attaque possibles ?",
            "Protéger un bot contre : Injection, Escalade de privilèges, Spam API, failles NPM/PyPI ?",
            "Protocole anti-raid : Détection comportementale, Rate limit, Lockdown dynamique ?",
            "Bot critique HS durant un raid. PCA en trois phases : urgence, stabilisation, restauration.",
            "Failover automatique pour haute disponibilité (HA) ?",
            "Monitoring proactif : logs centralisés, alertes, métriques CPU/RAM.",
            "Audit technique : Bot exécutant des actions imprévues sans modif code ?",
            "Conflit de bots (préfixe identique). Diagnostic source ?",
            "Éviter les collisions de permissions multi-bots ?",
            "Bot mutes accidentellement un admin. Failles de conception ?",
            "Architecture monolithique vs modulaire. Laquelle pour forte croissance ?",
            "Optimisation mémoire et Memory leaks ?",
            "Avantages/Inconvénients : JSON vs SQL vs NoSQL vs Redis ?",
            "Permissions hiérarchiques internes indépendantes des rôles Discord ?",
            "Bot propriétaire vs Bot public ?",
            "Evaluer la fiabilité d'un bot public avant ajout ?",
            "Politique attribution rôle Admin à un bot ? Argumentation.",
            "ÉTUDE DE CAS : 15k membres sous raid + exploitation bot + saturation API. Stratégie complète."
        ];
        document.getElementById('hid-user').value = localStorage.getItem('user');
        const cont = document.getElementById('container');
        questions.forEach((q, i) => { cont.innerHTML += `<div class="step"><div class="category">Section Expert ${i+1}/23</div><div class="question-text">${q}</div><textarea name="Reponse_${i+1}" required></textarea></div>`; });
        let current = 0; const steps = document.querySelectorAll('.step');
        function show(idx) { steps.forEach((s, i) => s.classList.toggle('active', i === idx)); document.getElementById('bar').style.width = ((idx + 1) / steps.length) * 100 + "%"; document.getElementById('prev').style.visibility = idx === 0 ? 'hidden' : 'visible'; document.getElementById('next').innerText = idx === steps.length - 1 ? 'Terminer' : 'Suivant'; }
        function move(n) { if (n === 1 && !steps[current].querySelector('textarea').value) return alert("Analyse technique requise."); current += n; if (current >= steps.length) document.getElementById('form').submit(); else show(current); }
        show(0);
    </script>
</body>
</html>
