<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Expert Bot Manager - Dynasty Family's</title>
    <style>
        body { margin: 0; background: #050a18; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .header { text-align: center; margin-bottom: 40px; }
        .logo { width: 80px; border-radius: 50%; border: 2px solid #ff8c00; }
        .title { color: #ff8c00; font-style: italic; text-transform: uppercase; margin-top: 10px; font-size: 24px; letter-spacing: 2px; }
        .exam-card { width: 950px; background: rgba(13, 20, 38, 0.95); border-radius: 15px; border: 1px solid #ff8c00; padding: 60px; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .progress-bar { position: absolute; top: 0; left: 0; height: 5px; background: linear-gradient(to right, #ff8c00, #ff5500); width: 0%; transition: 0.4s; }
        .step { display: none; }
        .step.active { display: block; }
        .category { color: #ff8c00; text-transform: uppercase; font-size: 12px; font-weight: 900; margin-bottom: 10px; letter-spacing: 1px; }
        .question-text { font-size: 20px; margin-bottom: 30px; font-weight: bold; line-height: 1.5; border-left: 5px solid #ff8c00; padding-left: 15px; }
        textarea { width: 100%; height: 350px; background: rgba(0,0,0,0.5); border: 1px solid #444; border-radius: 5px; color: #fff; padding: 25px; font-size: 18px; box-sizing: border-box; resize: none; outline: none; border-bottom: 2px solid transparent; transition: 0.3s; }
        textarea:focus { border-color: #ff8c00; background: rgba(0,0,0,0.7); }
        .nav-btns { margin-top: 40px; display: flex; justify-content: space-between; }
        .btn { padding: 20px 60px; border-radius: 5px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-next { background: #ff8c00; color: #000; box-shadow: 0 4px 15px rgba(255,140,0,0.3); }
        .btn-prev { background: #111; color: #666; }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo">
        <div class="title">Expert Bot Manager Examination</div>
    </div>
    <div class="exam-card">
        <div class="progress-bar" id="bar"></div>
        <form action="https://formspree.io/f/xnjbrvez" method="POST" id="form">
            <input type="hidden" name="Pseudo" id="hid-user">
            <input type="hidden" name="Poste" value="Bot Manager Expert">
            <div id="container"></div>
            <div class="nav-btns">
                <button type="button" class="btn btn-prev" id="prev" onclick="move(-1)">Précédent</button>
                <button type="button" class="btn btn-next" id="next" onclick="move(1)">Suivant</button>
            </div>
        </form>
    </div>
    <script>
        const questions = [
            "I. Architecture & Hébergement : Analyse comparativement une architecture self-hosted, cloud-managed et serverless pour un bot Discord. Discute des implications en matière de latence, scalabilité horizontale, résilience et coûts d’exploitation.",
            "Explique les différences fondamentales entre : Gateway Intents privilégiés, Webhooks, et Slash Commands (Interactions API). Dans quels contextes privilégierais-tu chacun ?",
            "Décris le cycle de vie complet d’un bot Discord depuis l’authentification OAuth2 jusqu’au traitement d’un événement (event dispatch → handler → réponse).",
            "Quels sont les risques liés au stockage local d’un token bot ? Propose une architecture sécurisée pour la gestion des secrets (ex : variables d’environnement chiffrées, vault, rotation de token).",
            "II. Permissions & Sécurité Avancée : Analyse le principe du Least Privilege (Moindre Privilège) dans le contexte d’un bot Discord. Comment l’implémenter concrètement ?",
            "Détaille les permissions pouvant provoquer une compromission massive du serveur si mal configurées (ex : Manage Roles, Administrator, Manage Webhooks…). Explique les scénarios d’attaque possibles.",
            "Comment protéger un bot contre : Injection de commandes, Escalade de privilèges, Spam API / Rate limit abuse, Exploitation via faille dans une dépendance NPM/PyPI ?",
            "Propose un protocole de prévention anti-raid intégrant : Détection comportementale, Limitation de fréquence (rate limiting), Journalisation automatisée, Mode lockdown dynamique.",
            "III. Résilience & Gestion de crise : Un bot critique tombe en panne durant un raid actif. Décris un plan de continuité opérationnelle (PCA) structuré en trois phases : urgence immédiate – stabilisation – restauration complète.",
            "Comment implémenterais-tu un système de failover automatique pour garantir une haute disponibilité (HA) ?",
            "Décris une méthode de monitoring proactive (logs centralisés, alertes webhook, uptime monitoring, métriques CPU/RAM).",
            "Un bot commence à exécuter des actions imprévues sans modification récente du code. Quelle serait ta démarche d’audit technique ?",
            "IV. Conflits & Interopérabilité : Deux bots entrent en conflit à cause d’un préfixe identique ou d’événements redondants. Explique comment diagnostiquer précisément la source du conflit.",
            "Comment éviter les collisions de permissions lorsque plusieurs bots gèrent les rôles automatiquement ?",
            "Un bot mute accidentellement un administrateur à cause d’un mauvais algorithme de détection. Analyse les failles de conception qui ont permis cette erreur.",
            "V. Développement & Optimisation : Explique la différence entre une architecture monolithique et modulaire pour un bot. Laquelle privilégierais-tu pour un serveur à forte croissance ?",
            "Comment optimiser un bot pour réduire la consommation mémoire et éviter les memory leaks ?",
            "Quels sont les avantages et inconvénients d’un stockage : JSON local, Base SQL, Base NoSQL, Redis cache ?",
            "Comment implémenter un système de permissions hiérarchique interne au bot indépendant des rôles Discord ?",
            "VI. Gouvernance & Décision Stratégique : Dans quels cas justifierais-tu la création d’un bot propriétaire plutôt que l’utilisation d’un bot public reconnu ?",
            "Comment évaluer la fiabilité d’un bot public avant de l’ajouter au serveur ?",
            "Quelle serait ta politique concernant l’attribution du rôle Administrateur à un bot ? Donne une réponse argumentée, technique et sécuritaire.",
            "VII. Étude de cas finale (niveau expert) : Ton serveur de 15 000 membres subit : un raid coordonné, une tentative d’exploitation d’un bot via commande mal filtrée, une saturation API. Décris ta stratégie complète (Actions immédiates, Mesures techniques, Communication staff, Rapport)."
        ];

        document.getElementById('hid-user').value = localStorage.getItem('user') || "Anonyme";
        const cont = document.getElementById('container');
        questions.forEach((q, i) => {
            cont.innerHTML += `<div class="step">
                <div class="category">Section Expertise - Question ${i+1}/23</div>
                <div class="question-text">${q}</div>
                <textarea name="Reponse_Expert_${i+1}" placeholder="Analyse technique approfondie..." required></textarea>
            </div>`;
        });

        let current = 0;
        const steps = document.querySelectorAll('.step');
        function show(idx) {
            steps.forEach((s, i) => s.classList.toggle('active', i === idx));
            document.getElementById('bar').style.width = ((idx + 1) / steps.length) * 100 + "%";
            document.getElementById('prev').style.visibility = idx === 0 ? 'hidden' : 'visible';
            document.getElementById('next').innerText = idx === steps.length - 1 ? 'Soumettre l\'expertise' : 'Suivant';
        }
        function move(n) {
            if (n === 1 && !steps[current].querySelector('textarea').value.trim()) return alert("Analyse technique requise.");
            current += n;
            if (current >= steps.length) document.getElementById('form').submit();
            else show(current);
        }
        show(0);
    </script>
</body>
</html>
