<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidature Bot Manager - Dynasty Family's</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* BASE & FOND ÉTOILÉ (Style image_27535a) */
        body {
            margin: 0;
            padding: 0;
            background-color: #050a18; /* Bleu nuit profond */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        /* LOGO & TITRES (Style image_267605) */
        .logo-main {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid #ff8c00;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.6);
            margin-bottom: 20px;
        }

        .main-title {
            color: #ff8c00;
            font-style: italic;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin: 5px 0;
        }

        .main-subtitle {
            color: #ff8c00;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        /* BLOCS DE FORMULAIRE (Style image_260638) */
        .glass-card {
            background: rgba(13, 20, 38, 0.95);
            border: 1px solid rgba(255, 140, 0, 0.2);
            border-radius: 15px;
            padding: 30px;
            text-align: left;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .section-header {
            color: #ff8c00;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1rem;
            border-bottom: 2px solid #ff8c00;
            padding-bottom: 8px;
            margin: 30px 0 20px 0;
            display: inline-block;
        }

        .question-block {
            margin-bottom: 25px;
        }

        .label-text {
            display: block;
            color: #ffffff;
            font-size: 0.95rem;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: #ff8c00;
        }

        /* BOUTONS */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: #ff8c00;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #e67e00;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.4);
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo-main">
        <h1 class="main-title">Candidature Bot Manager</h1>
        <div class="main-subtitle">Examen Technique de Haut Niveau</div>

        <form action="https://formspree.io/f/xnjbrvez" method="POST">
            <input type="hidden" name="Candidat" id="hidden-pseudo">

            <div class="glass-card">
                <div class="section-header">I. Architecture & Hébergement</div>
                
                <div class="question-block">
                    <label class="label-text">1. Analyse comparativement une architecture self-hosted, cloud-managed et serverless pour un bot Discord. Discute des implications en matière de latence, scalabilité horizontale, résilience et coûts d’exploitation.</label>
                    <textarea name="Q1" required></textarea>
                </div>

                <div class="question-block">
                    <label class="label-text">2. Explique les différences fondamentales entre les Gateway Intents privilégiés, les Webhooks et les Slash Commands. Dans quels contextes privilégierais-tu chacun ?</label>
                    <textarea name="Q2" required></textarea>
                </div>

                <div class="question-block">
                    <label class="label-text">3. Décris le cycle de vie complet d’un bot Discord depuis l’authentification OAuth2 jusqu’au traitement d’un événement (event dispatch → handler → réponse).</label>
                    <textarea name="Q3" required></textarea>
                </div>

                <div class="question-block">
                    <label class="label-text">4. Quels sont les risques liés au stockage local d’un token bot ? Propose une architecture sécurisée pour la gestion des secrets (ex : variables d’environnement chiffrées, vault, rotation de token).</label>
                    <textarea name="Q4" required></textarea>
                </div>

                <div class="section-header">II. Permissions & Sécurité Avancée</div>

                <div class="question-block">
                    <label class="label-text">5. Analyse le principe du Least Privilege (Moindre Privilège) dans le contexte d’un bot Discord. Comment l’implémenter concrètement ?</label>
                    <textarea name="Q5" required></textarea>
                </div>

                <div class="question-block">
                    <label class="label-text">6. Détaille les permissions pouvant provoquer une compromission massive du serveur si mal configurées (Manage Roles, Admin, etc.).</label>
                    <textarea name="Q6" required></textarea>
                </div>

                <div class="section-header">III. Résilience & Gestion de crise</div>

                <div class="question-block">
                    <label class="label-text">9. Un bot critique tombe en panne durant un raid actif. Décris un plan de continuité opérationnelle (PCA) structuré en trois phases.</label>
                    <textarea name="Q9" required></textarea>
                </div>

                <div class="section-header">VII. Étude de cas finale</div>
                <div class="question-block">
                    <label class="label-text">23. Ton serveur de 15 000 membres subit un raid coordonné, une tentative d’exploitation d’un bot et une saturation API. Décris ta stratégie complète.</label>
                    <textarea name="Q23" required></textarea>
                </div>

                <button type="submit" class="btn-submit">Envoyer la candidature</button>
                <a href="hub.html" class="back-link">Retour au hub</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('hidden-pseudo').value = localStorage.getItem('user') || "Anonyme";
    </script>
</body>
</html>
