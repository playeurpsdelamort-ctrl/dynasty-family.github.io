<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Bot Manager - Dynasty Family's</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .glass-card { width: 100%; max-width: 750px; position: relative; overflow: hidden; }
        
        /* Progress Bar */
        .progress-container { width: 100%; background: rgba(255,255,255,0.1); height: 6px; border-radius: 10px; margin-bottom: 30px; }
        .progress-bar { height: 100%; background: var(--gold); width: 0%; transition: 0.4s; box-shadow: 0 0 10px var(--gold-glow); }
        
        .step { display: none; animation: fadeIn 0.5s ease; }
        .step.active { display: block; }

        .question-num { color: var(--gold); font-weight: 900; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .question-text { font-size: 1.1rem; line-height: 1.6; margin-bottom: 25px; font-weight: 700; color: #fff; }

        textarea { width: 100%; min-height: 150px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; padding: 15px; font-family: inherit; font-size: 1rem; resize: none; transition: 0.3s; }
        textarea:focus { outline: none; border-color: var(--gold); background: rgba(0,0,0,0.6); }

        .nav-btns { display: flex; justify-content: space-between; margin-top: 30px; gap: 15px; }
        .btn-nav { padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; border: none; text-transform: uppercase; font-size: 0.8rem; }
        .btn-prev { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-next { background: var(--gold); color: #000; flex-grow: 1; }
        .btn-next:hover { box-shadow: 0 0 15px var(--gold-glow); }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <div id="star-field"></div>

    <div class="container">
        <div class="glass-card">
            <div id="header-form">
                <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo" style="width: 60px; height: 60px; margin-bottom: 10px;">
                <h1 style="font-size: 1.2rem; margin-bottom: 5px;">Examen Bot Manager</h1>
                <div class="progress-container"><div class="progress-bar" id="progress"></div></div>
            </div>

            <form action="https://formspree.io/f/xnjbrvez" method="POST" id="exam-form">
                <input type="hidden" name="Candidat" id="candidat-name">
                <input type="hidden" name="Poste" value="Bot Manager">

                <div id="steps-container">
                    </div>

                <div class="nav-btns">
                    <button type="button" class="btn-nav btn-prev" id="prevBtn" onclick="changeStep(-1)" style="visibility: hidden;">Précédent</button>
                    <button type="button" class="btn-nav btn-next" id="nextBtn" onclick="changeStep(1)">Démarrer l'examen</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script-stars.js"></script>
    <script>
        const questions = [
            "Analyse comparativement une architecture self-hosted, cloud-managed et serverless pour un bot Discord. Discute des implications en matière de latence, scalabilité horizontale, résilience et coûts d’exploitation.",
            "Explique les différences fondamentales entre : Gateway Intents privilégiés, Webhooks, et Slash Commands (Interactions API). Dans quels contextes privilégierais-tu chacun ?",
            "Décris le cycle de vie complet d’un bot Discord depuis l’authentification OAuth2 jusqu’au traitement d’un événement (event dispatch → handler → réponse).",
            "Quels sont les risques liés au stockage local d’un token bot ? Propose une architecture sécurisée pour la gestion des secrets (ex : variables d’environnement chiffrées, vault, rotation de token).",
            "Analyse le principe du Least Privilege (Moindre Privilège) dans le contexte d’un bot Discord. Comment l’implémenter concrètement ?",
            "Détaille les permissions pouvant provoquer une compromission massive du serveur si mal configurées (ex : Manage Roles, Administrator, Manage Webhooks…). Explique les scénarios d’attaque possibles.",
            "Comment protéger un bot contre : Injection de commandes, Escalade de privilèges, Spam API / Rate limit abuse, et Exploitation via faille dans une dépendance NPM/PyPI ?",
            "Propose un protocole de prévention anti-raid intégrant : Détection comportementale, Limitation de fréquence (rate limiting), Journalisation automatisée et Mode lockdown dynamique.",
            "Un bot critique tombe en panne durant un raid actif. Décris un plan de continuité opérationnelle (PCA) structuré en trois phases : urgence immédiate – stabilisation – restauration complète.",
            "Comment implémenterais-tu un système de failover automatique pour garantir une haute disponibilité (HA) ?",
            "Décris une méthode de monitoring proactive (logs centralisés, alertes webhook, uptime monitoring, métriques CPU/RAM).",
            "Un bot commence à exécuter des actions imprévues sans modification récente du code. Quelle serait ta démarche d’audit technique ?",
            "Deux bots entrent en conflit à cause d’un préfixe identique ou d’événements redondants. Explique comment diagnostiquer précisément la source du conflit.",
            "Comment éviter les collisions de permissions lorsque plusieurs bots gèrent les rôles automatiquement ?",
            "Un bot mute accidentellement un administrateur à cause d’un mauvais algorithme de détection. Analyse les failles de conception qui ont permis cette erreur.",
            "Explique la différence entre une architecture monolithique et modulaire pour un bot. Laquelle privilégierais-tu pour un serveur à forte croissance ?",
            "Comment optimiser un bot pour réduire la consommation mémoire et éviter les memory leaks ?",
            "Quels sont les avantages et inconvénients d’un stockage : JSON local, Base SQL, Base NoSQL, et Redis cache ?",
            "Comment implémenter un système de permissions hiérarchique interne au bot indépendant des rôles Discord ?",
            "Dans quels cas justifierais-tu la création d’un bot propriétaire plutôt que l’utilisation d’un bot public reconnu ?",
            "Comment évaluer la fiabilité d’un bot public avant de l’ajouter au serveur ?",
            "Quelle serait ta politique concernant l’attribution du rôle Administrateur à un bot ? Donne une réponse argumentée, technique et sécuritaire.",
            "Cas d'étude expert : Ton serveur de 15 000 membres subit un raid coordonné, une tentative d’exploitation via commande mal filtrée et une saturation API. Décris ta stratégie complète (Actions, Tech, Comm, Rapport)."
        ];

        const container = document.getElementById('steps-container');
        document.getElementById('candidat-name').value = localStorage.getItem('user') || "Anonyme";

        // Générer les étapes
        questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = `step ${i === 0 ? '' : ''}`; // On initialise tout à off
            div.innerHTML = `
                <span class="question-num">Question ${i + 1} / 23</span>
                <div class="question-text">${q}</div>
                <textarea name="reponse_q${i+1}" placeholder="Ta réponse technique détaillée..." required></textarea>
            `;
            container.appendChild(div);
        });

        let currentStep = -1; // -1 c'est l'état "pas encore commencé"
        const steps = document.querySelectorAll('.step');

        function changeStep(n) {
            // Validation avant de passer à la suite
            if (n === 1 && currentStep >= 0) {
                const currentTextarea = steps[currentStep].querySelector('textarea');
                if (!currentTextarea.value.trim()) {
                    alert("Merci de répondre à la question avant de passer à la suivante.");
                    return;
                }
            }

            if (currentStep >= 0) steps[currentStep].classList.remove('active');
            
            currentStep += n;

            if (currentStep >= steps.length) {
                document.getElementById('exam-form').submit();
                return;
            }

            steps[currentStep].classList.add('active');
            updateUI();
        }

        function updateUI() {
            const progress = ((currentStep + 1) / steps.length) * 100;
            document.getElementById('progress').style.width = progress + "%";
            
            document.getElementById('prevBtn').style.visibility = currentStep > 0 ? 'visible' : 'hidden';
            document.getElementById('nextBtn').innerText = currentStep === steps.length - 1 ? "Terminer et Envoyer" : (currentStep === -1 ? "Démarrer" : "Question Suivante");
            
            if(currentStep === -1) {
                // État initial
                document.querySelector('.progress-container').style.display = 'none';
                changeStep(1); // Auto-start
            } else {
                document.querySelector('.progress-container').style.display = 'block';
            }
        }
        
        updateUI();
    </script>
</body>
</html>
