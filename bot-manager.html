<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Examen Bot Manager - Dynasty Family's</title>
    <style>
        body { margin:0; background:#050a18; color:white; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:15px; box-sizing:border-box; }
        .header { text-align:center; margin-bottom:15px; }
        .logo { width:70px; height:70px; border-radius:50%; border:2px solid #ff8c00; }
        .title { color:#ff8c00; font-style:italic; font-size:1.2rem; margin:5px 0; text-transform:uppercase; }
        .card { width:100%; max-width:600px; background:rgba(13,20,38,0.95); border-radius:15px; border:1px solid rgba(255,140,0,0.3); padding:20px; box-sizing:border-box; }
        .progress-bg { width:100%; height:4px; background:rgba(255,255,255,0.1); margin-bottom:20px; border-radius:10px; }
        .progress-bar { height:100%; background:#ff8c00; width:0%; transition:0.3s; box-shadow:0 0 10px #ff8c00; }
        .step { display:none; animation:fadeIn 0.3s; }
        .step.active { display:block; }
        @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
        .q-num { color:#ff8c00; font-size:0.7rem; font-weight:bold; text-transform:uppercase; }
        .q-text { font-size:1.05rem; margin:10px 0 20px 0; font-weight:600; line-height:1.4; }
        textarea { width:100%; min-height:180px; background:#000; border:1px solid #333; border-radius:10px; color:#fff; padding:15px; font-size:16px; box-sizing:border-box; resize:none; }
        textarea:focus { border-color:#ff8c00; outline:none; }
        .btns { display:flex; flex-direction:column; gap:10px; margin-top:20px; }
        .btn { padding:16px; border-radius:10px; border:none; font-weight:bold; text-transform:uppercase; cursor:pointer; font-size:0.9rem; }
        .btn-next { background:#ff8c00; color:#000; order:1; }
        .btn-prev { background:rgba(255,255,255,0.05); color:#94a3b8; order:2; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo">
        <div class="title">Candidature Bot Manager</div>
    </div>
    <div class="card">
        <div class="progress-bg"><div class="progress-bar" id="bar"></div></div>
        <form action="https://formspree.io/f/xnjbrvez" method="POST" id="exam-form">
            <input type="hidden" name="Pseudo" id="hid-user">
            <input type="hidden" name="Poste" value="Bot Manager">
            <div id="steps-container"></div>
            <div class="btns">
                <button type="button" class="btn btn-next" id="nextBtn" onclick="changeStep(1)">Démarrer</button>
                <button type="button" class="btn btn-prev" id="prevBtn" onclick="changeStep(-1)" style="display:none">Précédent</button>
            </div>
        </form>
    </div>

    <script>
        const questions = [
            "Quels bots de modération maîtrises-tu le mieux (Dyno, MEE6, Carl-bot, Wick, etc.) ? Détaille ton expérience avec chacun.",
            "Explique comment tu configurerais un système d'Auto-mod complexe pour filtrer les liens de scam et les mots interdits sans gêner les membres.",
            "Comment sécurises-tu concrètement un serveur contre les raids massifs (self-bots) ? Quelles options de vérification privilégies-tu ?",
            "Décris ta méthode pour gérer les permissions des rôles sensibles (Admin/Modo) afin d'éviter toute faille de sécurité (2FA, hiérarchie).",
            "As-tu des notions en Webhooks ou en utilisation d'API Discord ? Si oui, donne un exemple d'utilisation utile pour le serveur.",
            "Comment créerais-tu un système de logs efficace pour surveiller les suppressions de messages et les modifications de rôles sans surcharger le staff ?",
            "Que fais-tu si le bot principal de modération tombe en panne en plein milieu d'une crise sur le serveur ?",
            "Comment gères-tu les conflits de rôles ou les bugs de hiérarchie qui empêchent certains membres d'accéder à leurs salons ?",
            "As-tu déjà créé ou hébergé tes propres bots (en Python, JS ou autre) ? Si oui, explique ce qu'ils faisaient précisément.",
            "Quelle est ta méthodologie pour tester une nouvelle configuration de bot avant de la rendre publique sur tout le serveur ?"
        ];

        document.getElementById('hid-user').value = localStorage.getItem('user') || "Anonyme";
        const container = document.getElementById('steps-container');

        questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'step';
            div.innerHTML = `
                <span class="q-num">Question technique ${i+1}/${questions.length}</span>
                <div class="q-text">${q}</div>
                <textarea name="Reponse_Bot_${i+1}" placeholder="Détails techniques attendus..." required></textarea>
            `;
            container.appendChild(div);
        });

        let current = -1;
        const steps = document.querySelectorAll('.step');

        function changeStep(n) {
            if (n === 1 && current >= 0) {
                const area = steps[current].querySelector('textarea');
                if (!area.value.trim()) { alert("Merci de fournir une réponse technique."); return; }
            }

            if (current >= 0) steps[current].classList.remove('active');
            current += n;

            if (current >= steps.length) {
                document.getElementById('exam-form').submit();
                return;
            }

            steps[current].classList.add('active');
            updateUI();
            window.scrollTo(0,0);
        }

        function updateUI() {
            const progress = ((current + 1) / steps.length) * 100;
            document.getElementById('bar').style.width = progress + "%";
            document.getElementById('prevBtn').style.display = current > 0 ? "block" : "none";
            document.getElementById('nextBtn').innerText = current === steps.length - 1 ? "Envoyer le dossier technique" : (current === -1 ? "Démarrer" : "Suivant");
            if(current === -1) changeStep(1);
        }
        updateUI();
    </script>
</body>
</html>
