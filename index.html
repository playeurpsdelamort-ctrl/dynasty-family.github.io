<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynasty Family's - Recrutement</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="star-field"></div>

    <div class="container">
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo" alt="Luffy Gear 5">
        </div>

        <h1>Dynasty Family’s</h1>
        <div class="subtitle">RECRUTEMENT DIVINEMENT FUN</div>

        <div class="glass-card">
            <div id="view-candidat">
                <div class="input-group">
                    <label>Pseudo Discord</label>
                    <input type="text" id="pseudo" placeholder="Luffy#1234">
                </div>
                <button class="btn" onclick="start()">Entrer dans la Dynasty</button>
                <a class="staff-link" onclick="toggle()">Accès Staff</a>
            </div>

            <div id="view-admin" style="display:none;">
                <div class="input-group">
                    <label>Login Staff</label>
                    <input type="text" id="admin-user" placeholder="Identifiant">
                </div>
                <div class="input-group">
                    <label>Mot de passe</label>
                    <input type="password" id="admin-pass" placeholder="••••••••">
                </div>
                <button class="btn" style="background: white;" onclick="login()">Connexion Admin</button>
                <a class="staff-link" onclick="toggle()">Retour</a>
            </div>
        </div>
    </div>

    <script>
        // Génération des étoiles
        const field = document.getElementById('star-field');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            field.appendChild(star);
        }

        function toggle() {
            const cv = document.getElementById('view-candidat');
            const av = document.getElementById('view-admin');
            cv.style.display = cv.style.display === 'none' ? 'block' : 'none';
            av.style.display = av.style.display === 'none' ? 'block' : 'none';
        }

        function start() {
            const p = document.getElementById('pseudo').value.trim();
            if(p) {
                localStorage.setItem('user', p);
                window.location.href = "hub.html";
            } else {
                alert("Entre ton pseudo Discord !");
            }
        }

        function login() {
            const u = document.getElementById('admin-user').value;
            const p = document.getElementById('admin-pass').value;
            if(u === "Admin" && p === "Gear5") {
                localStorage.setItem('role', 'admin');
                window.location.href = "admin-view.html";
            } else {
                alert("Identifiants incorrects.");
            }
        }
    </script>
</body>
</html>
