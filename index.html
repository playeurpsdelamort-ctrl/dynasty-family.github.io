<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynasty Family’s - Recrutement Centralisé</title>
    <style>
        /* Nouvelle Palette inspirée du logo Gear 5 Solaire */
        :root { 
            --gold: #f59e0b; /* Doré pour l'éclairage principal */
            --peach: #fb923c; /* Pêche doux pour les textes et lueurs secondaires */
            --bg-dark: #000212; /* Fond presque noir étoilé */
            --card-glass: rgba(20, 24, 39, 0.7); /* Effet verre sur fond cosmique */
            --text-main: #f1f5f9; /* Blanc-gris clair */
            --text-sub: #a1a1aa; /* Gris zinc */
            --glow: rgba(245, 158, 11, 0.5); /* Lueur dorée */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            /* Fond dégradé cosmique avec effet étoile (via image ou css pur) */
            background: linear-gradient(135deg, #000212 0%, #171d33 100%);
            color: var(--text-main); 
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            padding: 10px;
            min-height: 100vh;
        }

        .container { 
            width: 100%; max-width: 850px; 
            margin: 10px auto;
            padding: 30px 15px; 
            background: transparent;
        }

        /* --- Header avec Logo Solaire --- */
        .header { text-align: center; margin-bottom: 35px; position: relative; }
        
        /* Conteneur pour créer l'effet de lueur "Soleil" derrière le logo */
        .logo-wrap {
            position: relative;
            display: inline-block;
        }
        .logo-wrap::after {
            content: "";
            position: absolute; width: 150%; height: 150%; top: -25%; left: -25%;
            background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
            border-radius: 50%; z-index: -1;
        }

        .logo { 
            width: 120px; height: 120px; 
            border-radius: 50%; 
            border: 4px solid #fff; /* Bord blanc comme Luffy */
            box-shadow: 0 0 30px var(--glow), 0 0 10px #fff;
            object-fit: cover;
        }
        
        h1 { 
            color: var(--gold); 
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 20px 0 5px;
            font-weight: 900;
            text-shadow: 0 0 10px var(--glow);
        }
        .subtitle { 
            color: var(--peach); 
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 30px; 
        }

        /* --- Tabs Stylés --- */
        .tab-switcher {
            display: flex; background: rgba(0,0,0,0.5); 
            padding: 6px; border-radius: 50px; 
            margin-bottom: 35px; border: 1px solid rgba(255,255,255,0.1);
        }
        .tab-btn {
            flex: 1; padding: 14px 10px; 
            border: none; background: transparent; 
            color: var(--text-sub); cursor: pointer; 
            font-weight: 800; border-radius: 50px; 
            font-size: 0.8rem; text-transform: uppercase;
            transition: 0.3s cubic-bezier(0.2, 0, 0, 1);
        }
        .tab-btn.active { 
            background: var(--gold); 
            color: #000; 
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4); 
        }

        /* --- Structure du Formulaire en Carte de Verre --- */
        .form-content { display: none; animation: slideIn 0.5s ease-out; }
        .form-content.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Chaque carte d'entrée se détache sur le fond cosmique */
        .glass-card {
            background: var(--card-glass); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 25px 20px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            transition: transform 0.3s;
        }
        .glass-card:hover { transform: translateY(-3px); border-color: var(--accent); }

        .group-title { 
            color: var(--gold); font-size: 0.8rem; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 1px;
            margin: 0 0 20px 0; border-bottom: 1px solid rgba(245,158,11,0.2); padding-bottom: 5px;
        }

        label { display: block; margin-bottom: 10px; font-size: 0.9rem; color: #fff; font-weight: 600; }
        
        input, textarea { 
            width: 100%; padding: 15px; 
            background: rgba(0,0,0,0.3); border: 1px solid #334155; 
            color: #fff; border-radius: 12px; font-size: 1rem;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--gold); background: rgba(20,24,39,0.9); }
        ::placeholder { color: #52525b; font-style: italic; font-size: 0.9rem; }

        /* --- Bouton Envoyer Solaire --- */
        .submit-btn { 
            width: 100%; padding: 22px; 
            background: linear-gradient(135deg, var(--gold) 0%, var(--peach) 100%); 
            border: none; color: #000; font-weight: 900; 
            border-radius: 50px; cursor: pointer; text-transform: uppercase; 
            font-size: 1.1rem; margin-top: 10px;
            box-shadow: 0 10px 30px var(--glow);
            transition: 0.3s;
        }
        .submit-btn:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 15px 40px var(--glow); }

        footer { text-align: center; margin-top: 45px; color: var(--text-sub); font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-wrap">
            <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" alt="Logo Gear 5" class="logo">
        </div>
        <h1>𝘿𝙮𝙣𝙖𝙨𝙩𝙮 𝙁𝙖𝙢𝙞𝙡𝙮’𝙨</h1>
        <p class="subtitle">Recrutement Divinement Fun</p>
    </div>

    <div class="tab-switcher">
        <button class="tab-btn active" id="btn-mod" onclick="switchTab('mod')">Devenir Modo</button>
        <button class="tab-btn" id="btn-anim" onclick="switchTab('anim')">Devenir Anim</button>
    </div>

    <form id="form-mod" class="form-content active" action="https://formspree.io/f/xnjbrvez" method="POST">
        <input type="hidden" name="Role" value="MODERATEUR">
        
        <div class="glass-card">
            <label>Pseudo Discord & Âge</label>
            <input type="text" name="identité" required placeholder="Ex: Sanji_G5#1234 (18 ans)">
        </div>

        <div class="glass-card">
            <div class="group-title">SÉCURITÉ & DISCIPLINE (22 QUESTIONS)</div>
            <label>1. Présente ton parcours modération.</label>
            <textarea name="m1" rows="3" required placeholder="Ex: Staff sur 3 serveurs Blox Fruits..."></textarea>
            
            <label>2. Comment désamorces-tu un conflit ?</label>
            <textarea name="m2" rows="3" required></textarea>

            <label>3. Ton avis sur l'abus de pouvoir ?</label>
            <textarea name="m3" rows="3" required></textarea>

            <label>4. Pourquoi toi et pas un autre ?</label>
            <textarea name="m4" rows="3" required placeholder="Tes qualités uniques..."></textarea>
            
            </div>

        <button type="submit" class="submit-btn">Soumettre candidature divine</button>
    </form>

    <form id="form-anim" class="form-content" action="https://formspree.io/f/xnjbrvez" method="POST">
        <input type="hidden" name="Role" value="ANIMATEUR">
        <div class="glass-card">
            <label>Pseudo & Âge</label>
            <input type="text" name="pseudo" required placeholder="Ex: Brook_Soul#1234 (20 ans)">
        </div>
        
        <div class="glass-card">
            <div class="group-title">AMBIANCE & CRÉATIVITÉ</div>
            <label>1. Idées d'événements pour la Dynasty ?</label>
            <textarea name="idees" rows="4" placeholder="Quiz, Tournois, Karaoké One Piece..."></textarea>
            
            <label>2. Es-tu à l'aise pour parler en vocal devant 50 personnes ?</label>
            <textarea name="vocal" rows="3" required></textarea>
        </div>

        <button type="submit" class="submit-btn">Postuler pour l'ambiance G5</button>
    </form>

    <footer>DYNASTY FAMILY’S • Déesse de la Modération 2026<br>All Rights Reserved</footer>
</div>

<script>
    function switchTab(type) {
        // Cacher tous les formulaires
        document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));
        // Désactiver tous les boutons
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        // Afficher le bon et activer le bouton
        if(type === 'mod') {
            document.getElementById('form-mod').classList.add('active');
            document.getElementById('btn-mod').classList.add('active');
        } else {
            document.getElementById('form-anim').classList.add('active');
            document.getElementById('btn-anim').classList.add('active');
        }
    }
</script>

</body>
</html>
