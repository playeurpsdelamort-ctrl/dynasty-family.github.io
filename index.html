<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynasty Family’s - Recrutement G5</title>
    <style>
        :root { 
            --gold: #fb923c; 
            --white-aura: rgba(255, 255, 255, 0.8);
            --bg-dark: #020617; 
            --card-glass: rgba(15, 23, 42, 0.9);
            --text-main: #f1f5f9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: #000;
            background-image: 
                radial-gradient(1.5px 1.5px at 25px 35px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 100px, var(--white-aura), rgba(0,0,0,0)),
                linear-gradient(135deg, #020617 0%, #0f172a 100%);
            background-attachment: fixed;
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 10px; min-height: 100vh;
        }

        .container { width: 100%; max-width: 800px; margin: 0 auto; padding-bottom: 50px; }

        /* HEADER & LOGO */
        .header { text-align: center; margin-bottom: 30px; padding-top: 20px; }
        .logo { 
            width: 110px; height: 110px; border-radius: 50%; 
            border: 3px solid #fff; box-shadow: 0 0 25px var(--white-aura);
            object-fit: cover; background: #000; margin-bottom: 15px;
            animation: pulse 3s infinite ease-in-out;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 40px var(--white-aura); } }
        
        h1 { color: #fff; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 4px; margin: 5px 0; font-weight: 900; }
        .subtitle { color: var(--gold); font-size: 0.9rem; letter-spacing: 2px; font-weight: bold; }

        .form-title { text-align: center; color: #fff; font-size: 1.1rem; font-weight: 700; margin: 20px 0; letter-spacing: 5px; opacity: 0.8; }

        /* NAVIGATION */
        .tab-switcher {
            display: flex; background: rgba(255,255,255,0.05); padding: 6px; 
            border-radius: 15px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 10px; z-index: 100; backdrop-filter: blur(15px);
        }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: transparent; 
            color: #94a3b8; cursor: pointer; font-weight: 800; border-radius: 10px; 
            font-size: 0.8rem; text-transform: uppercase; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-btn.active { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }

        /* CARDS */
        .form-content { display: none; }
        .form-content.active { display: block; animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: var(--card-glass); border-radius: 24px; 
            padding: 25px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin-bottom: 20px;
        }

        .category-header { 
            color: #000; background: #fff; font-size: 0.85rem; font-weight: 900; 
            text-transform: uppercase; margin: -25px -25px 20px -25px; 
            padding: 12px; border-radius: 24px 24px 0 0; text-align: center;
        }

        label { display: block; margin-top: 20px; margin-bottom: 10px; font-size: 0.95rem; font-weight: 600; color: #e2e8f0; line-height: 1.5; }
        
        input, textarea { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 14px; 
            font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: #fff; background: rgba(0,0,0,0.6); box-shadow: 0 0 10px rgba(255,255,255,0.1); }

        .submit-btn { 
            width: 100%; padding: 20px; background: var(--gold); 
            border: none; color: #000; font-weight: 900; border-radius: 18px; 
            cursor: pointer; text-transform: uppercase; font-size: 1.1rem;
            box-shadow: 0 10px 25px rgba(251, 146, 60, 0.3); margin-top: 10px; transition: 0.3s;
        }
        .submit-btn:active { transform: scale(0.98); }

        .staff-mention { color: var(--gold); font-weight: 800; display: block; margin-top: 20px; text-align: center; letter-spacing: 2px; }
        footer { text-align: center; color: #475569; font-size: 0.75rem; padding: 20px; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" alt="Logo" class="logo">
        <h1>𝘿𝙮𝙣𝙖𝙨𝙩𝙮 𝙁𝙖𝙢𝙞𝙡𝙮’ｓ</h1>
        <p class="subtitle">DIVISION RECRUTEMENT G5</p>
    </div>

    <div class="form-title">FORMULAIRES</div>

    <div class="tab-switcher">
        <button class="tab-btn active" id="btn-mod" onclick="showForm('mod')">Poste Modérateur</button>
        <button class="tab-btn" id="btn-anim" onclick="showForm('anim')">Poste Animateur Test</button>
    </div>

    <div id="section-mod" class="form-content active">
        <form action="https://formspree.io/f/xnjbrvez" method="POST">
            <input type="hidden" name="Role" value="MODÉRATEUR">
            <div class="glass-card">
                <label>Pseudo Discord & Âge</label>
                <input type="text" name="identite" required placeholder="Ex: Luffy#0001 (19 ans)">
            </div>

            <div class="glass-card">
                <div class="category-header">📦 Expérience & Vision</div>
                <label>1. Présente ton parcours sur Discord (ancienneté, serveurs, rôles...).</label>
                <textarea name="m1" required></textarea>
                <label>2. Décris une expérience de modération difficile et tes décisions.</label>
                <textarea name="m2" required></textarea>
                <label>3. As-tu déjà participé à l’élaboration d’un règlement ?</label>
                <textarea name="m3" required></textarea>
                <label>4. Quelle est ta conception du rôle de modérateur ?</label>
                <textarea name="m4" required></textarea>
                <label>5. En quoi ta candidature se distingue-t-elle ?</label>
                <textarea name="m5" required></textarea>
                <label>6. Frontière entre autorité légitime et abus de pouvoir ?</label>
                <textarea name="m6" required></textarea>
                <label>7. Comment contribues-tu à un climat sain ?</label>
                <textarea name="m7" required></textarea>
            </div>

            <div class="glass-card">
                <div class="category-header">⚖️ Gestion & Éthique</div>
                <label>8. Un membre influent enfreint le règlement. Stratégie ?</label>
                <textarea name="m8" required></textarea>
                <label>9. Conflit entre deux membres. Comment juges-tu ?</label>
                <textarea name="m9" required></textarea>
                <label>10. Un membre conteste publiquement une sanction ?</label>
                <textarea name="m10" required></textarea>
                <label>11. Raid nocturne : tes mesures d’urgence ?</label>
                <textarea name="m11" required></textarea>
                <label>12. Un collègue abuse de ses perms. Ta réaction ?</label>
                <textarea name="m12" required></textarea>
                <label>13. Objectivité face à la pression ?</label>
                <textarea name="m13" required></textarea>
                <label>14. Différence entre troll et membre problématique ?</label>
                <textarea name="m14" required></textarea>
                <label>15. Fermeté ou pédagogie ?</label>
                <textarea name="m15" required></textarea>
                <label>16. Définis l’impartialité.</label>
                <textarea name="m16" required></textarea>
                <label>17. Ton ami enfreint le règlement. Ta démarche ?</label>
                <textarea name="m17" required></textarea>
                <label>18. Comment éviter les biais personnels ?</label>
                <textarea name="m18" required></textarea>
            </div>

            <div class="glass-card">
                <div class="category-header">⚙️ Technique & Sanctions</div>
                <label>19. Explique les sanctions progressives (warn -> ban).</label>
                <textarea name="m19" required></textarea>
                <label>20. Importance des logs ?</label>
                <textarea name="m20" required></textarea>
                <label>21. Expérience avec les bots de modération ?</label>
                <textarea name="m21" required></textarea>
                <label>22. Quelles améliorations pour l'équipe ?</label>
                <textarea name="m22" required></textarea>
            </div>
            
            <button type="submit" class="submit-btn">Envoyer Candidature Modo</button>
        </form>
    </div>

    <div id="section-anim" class="form-content">
        <form action="https://formspree.io/f/xnjbrvez" method="POST">
            <input type="hidden" name="Role" value="ANIMATEUR TEST">
            <div class="glass-card">
                <label>Pseudo Discord & Âge</label>
                <input type="text" name="identite" required placeholder="Ex: Brook#0001 (20 ans)">
            </div>

            <div class="glass-card">
                <div class="category-header">📋 Informations générales</div>
                <label>Depuis combien de temps es-tu sur le serveur ?</label>
                <textarea name="a1" required></textarea>
                <label>As-tu déjà été animateur sur un autre serveur ? Si oui, explique ton rôle.</label>
                <textarea name="a2" required></textarea>
            </div>

            <div class="glass-card">
                <div class="category-header">🔥 Motivation et personnalité</div>
                <label>Pourquoi souhaites-tu devenir animateur ici ?</label>
                <textarea name="a3" required></textarea>
                <label>Quelles qualités penses-tu apporter au serveur ?</label>
                <textarea name="a4" required></textarea>
                <label>Comment réagirais-tu face à un membre irrespectueux ?</label>
                <textarea name="a5" required></textarea>
                <label>Préfères-tu travailler seul ou en équipe ? Pourquoi ?</label>
                <textarea name="a6" required></textarea>
                <label>Comment gères-tu le stress ou les conflits ?</label>
                <textarea name="a7" required></textarea>
                <label>Droit d’utiliser les permissions hors event ?</label>
                <textarea name="a8" required></textarea>
            </div>

            <div class="glass-card">
                <div class="category-header">🎨 Créativité & Gestion</div>
                <label>Quels types d’événements pourrais-tu proposer ?</label>
                <textarea name="a9" required></textarea>
                <label>Propose une idée d’animation originale.</label>
                <textarea name="a10" required></textarea>
                <label>Si tu devais créer un event rapide, que ferais-tu ?</label>
                <textarea name="a11" required></textarea>
                <label>Qu'est-ce qui rend une animation réussie ?</label>
                <textarea name="a12" required></textarea>
                <label>Crée une annonce complète pour un jeu (règles, etc.).</label>
                <textarea name="a13" rows="5" required></textarea>
                <label>Dispute entre membres pendant l'event ?</label>
                <textarea name="a14" required></textarea>
                <label>Tes disponibilités régulières ?</label>
                <textarea name="a15" required></textarea>
                <label>Gestion du spam pendant l'event ?</label>
                <textarea name="a16" required></textarea>
                <label>Event qui échoue (bug/manque), réaction ?</label>
                <textarea name="a17" required></textarea>
                <label>Un collègue ne suit pas les règles ?</label>
                <textarea name="a18" required></textarea>
                <label>Comment annoncer une info de façon engageante ?</label>
                <textarea name="a19" required></textarea>
            </div>

            <div class="glass-card">
                <div class="category-header">💻 Technique</div>
                <label>Maîtrise des commandes de bots (giveaway, mini-jeux) ?</label>
                <textarea name="a20" required></textarea>
                <label>Sais-tu gérer vocal et textuel en simultané ?</label>
                <textarea name="a21" required></textarea>
                <span class="staff-mention">@🛡️ STAFF DYNASTY</span>
            </div>

            <button type="submit" class="submit-btn">Envoyer Candidature Anim</button>
        </form>
    </div>

    <footer>DYNASTY FAMILY’S © 2026 - Tous droits réservés</footer>
</div>

<script>
    function showForm(type) {
        const modSection = document.getElementById('section-mod');
        const animSection = document.getElementById('section-anim');
        const modBtn = document.getElementById('btn-mod');
        const animBtn = document.getElementById('btn-anim');

        if (type === 'mod') {
            modSection.classList.add('active');
            animSection.classList.remove('active');
            modBtn.classList.add('active');
            animBtn.classList.remove('active');
        } else {
            animSection.classList.add('active');
            modSection.classList.remove('active');
            animBtn.classList.add('active');
            modBtn.classList.remove('active');
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
