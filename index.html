<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynasty Family’s - Connexion</title>
    <style>
        :root { --gold: #fb923c; --bg: #020617; }
        body { 
            background: var(--bg); color: white; font-family: sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
            background-image: linear-gradient(135deg, #020617 0%, #0f172a 100%);
        }
        .login-card {
            background: rgba(15, 23, 42, 0.9); padding: 40px; border-radius: 20px;
            border: 1px solid var(--gold); text-align: center; width: 90%; max-width: 400px;
        }
        .logo { width: 100px; border-radius: 50%; border: 2px solid white; margin-bottom: 20px; }
        h1 { color: var(--gold); font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; 
            border: 1px solid #475569; background: #000; color: white; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 15px; background: var(--gold); border: none; 
            border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        #error { color: #ef4444; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo">
        <h1>Accès Recrutement</h1>
        <input type="text" id="discord_user" placeholder="Ton Pseudo Discord (ex: Membre#0000)">
        <input type="password" id="access_code" placeholder="Code d'accès">
        <button onclick="login()">Se Connecter</button>
        <p id="error">Identifiants incorrects ou accès non autorisé.</p>
    </div>

    <script>
        function login() {
            const user = document.getElementById('discord_user').value;
            const code = document.getElementById('access_code').value;
            
            // Système de vérification simple (à modifier selon tes besoins)
            if(user !== "" && code === "G5_DYNASTY") {
                localStorage.setItem('dynasty_user', user);
                window.location.href = "hub.html";
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>
</body>
</html>
