<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recrutement - Dynasty Family’s</title>
    <style>
        :root { --blue-glow: #38bdf8; --bg-dark: #020617; --card-bg: rgba(30, 41, 59, 0.7); }
        body { background: radial-gradient(circle, #1e293b 0%, var(--bg-dark) 100%); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; background: var(--card-bg); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--blue-glow); box-shadow: 0 0 15px rgba(56, 189, 248, 0.5); }
        h1 { color: var(--blue-glow); text-align: center; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; font-weight: 900; }
        .intro { text-align: center; color: #94a3b8; font-size: 0.9em; margin-bottom: 30px; }
        .section-header { background: rgba(56, 189, 248, 0.1); color: var(--blue-glow); padding: 12px; border-radius: 5px; margin-top: 35px; font-weight: bold; text-transform: uppercase; font-size: 0.85em; border-left: 4px solid var(--blue-glow); }
        label { display: block; margin-top: 22px; margin-bottom: 10px; font-size: 0.95em; color: #e2e8f0; line-height: 1.4; }
        textarea { width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; transition: 0.3s; font-size: 0.95em; resize: vertical; }
        textarea:focus { border-color: var(--blue-glow); outline: none; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        button { width: 100%; margin-top: 45px; padding: 20px; background: var(--blue-glow); border: none; color: #020617; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1.1em; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #7dd3fc; transform: translateY(-2px); box-shadow: 0 5px 25px rgba(56, 189, 248, 0.4); }
        footer { text-align: center; margin-top: 30px; color: #475569; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://via.placeholder.com/120" alt="Logo Dynasty">
    </div>
    <h1>𝘿𝙮𝙣𝙖𝙨𝙩𝙮 𝙁𝙖𝙢𝙞𝙡𝙮’𝙨</h1>
    <p class="intro">⚓ Recrutement Officiel - Session Staff ⚓</p>

    <form action="https://formspree.io/f/xnjbrvez" method="POST">
        
        <div class="section-header">I. Parcours & Expérience</div>
        <label>1. Présente ton parcours sur Discord de manière détaillée (ancienneté, types de serveurs, rôles, responsabilités).</label>
        <textarea name="q1" rows="4" required></textarea>

        <label>2. Décris une expérience concrète de modération difficile que tu as vécue et explique tes décisions stratégiques.</label>
        <textarea name="q2" rows="4" required></textarea>

        <label>3. As-tu déjà participé à l’élaboration ou à l’amélioration d’un règlement ? Si oui, explique ta méthodologie.</label>
        <textarea name="q3" rows="3" required></textarea>

        <div class="section-header">II. Motivation & Vision</div>
        <label>4. Quelle est ta conception du rôle de modérateur au sein d’une communauté structurée ?</label>
        <textarea name="q4" rows="3" required></textarea>

        <label>5. En quoi ta candidature se distingue-t-elle des autres ?</label>
        <textarea name="q5" rows="3" required></textarea>

        <label>6. Quelle est, selon toi, la frontière entre autorité légitime et abus de pouvoir ?</label>
        <textarea name="q6" rows="3" required></textarea>

        <label>7. Comment contribues-tu à instaurer un climat sain et durable ?</label>
        <textarea name="q7" rows="3" required></textarea>

        <div class="section-header">III. Analyse & Gestion de situations</div>
        <label>8. Un membre influent enfreint volontairement le règlement. Quelle stratégie adoptes-tu ?</label>
        <textarea name="q8" rows="3" required></textarea>

        <label>9. Deux membres se provoquent mutuellement. Comment établis-tu les responsabilités ?</label>
        <textarea name="q9" rows="3" required></textarea>

        <label>10. Un membre conteste publiquement une sanction. Comment gères-tu la situation ?</label>
        <textarea name="q10" rows="3" required></textarea>

        <label>11. Une vague de raid survient en pleine nuit. Quelles sont tes mesures d’urgence ?</label>
        <textarea name="q11" rows="3" required></textarea>

        <label>12. Un modérateur abuse de ses permissions. Quelle est ta réaction ?</label>
        <textarea name="q12" rows="3" required></textarea>

        <div class="section-header">IV. Posture Professionnelle</div>
        <label>13. Comment maintiens-tu ton objectivité face aux provocations ?</label>
        <textarea name="q13" rows="3" required></textarea>

        <label>14. Comment différencies-tu un simple troll d’un membre réellement problématique ?</label>
        <textarea name="q14" rows="3" required></textarea>

        <label>15. Penses-tu que la fermeté doit primer sur la pédagogie ? Argumente.</label>
        <textarea name="q15" rows="3" required></textarea>

        <div class="section-header">V. Impartialité & Éthique</div>
        <label>16. Définis le principe d’impartialité en modération.</label>
        <textarea name="q16" rows="2" required></textarea>

        <label>17. Si un ami proche enfreint le règlement, quelle serait ta démarche exacte ?</label>
        <textarea name="q17" rows="3" required></textarea>

        <label>18. Comment éviter les biais personnels dans tes décisions ?</label>
        <textarea name="q18" rows="3" required></textarea>

        <div class="section-header">VI. Compétences techniques</div>
        <label>19. Explique le fonctionnement des sanctions progressives (warn → mute → kick → ban).</label>
        <textarea name="q19" rows="3" required></textarea>

        <label>20. Décris le rôle des logs et pourquoi ils sont essentiels.</label>
        <textarea name="q20" rows="2" required></textarea>

        <label>21. As-tu déjà configuré un bot de modération ? Décris tes actions.</label>
        <textarea name="q21" rows="3" required></textarea>

        <div class="section-header">VII. Conclusion</div>
        <label>22. Si tu étais responsable, quelles améliorations structurelles proposerais-tu ?</label>
        <textarea name="q22" rows="4" required></textarea>

        <button type="submit">Envoyer ma candidature à l'État-Major</button>
    </form>
    <footer>© 2026 Dynasty Family’s</footer>
</div>

</body>
</html>
