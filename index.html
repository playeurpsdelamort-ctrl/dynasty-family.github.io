<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynasty Family's - Accueil</title>
    <style>
        body { margin:0; background:#050a18; color:white; font-family:'Segoe UI',sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .login-card { width:90%; max-width:400px; background:rgba(13,20,38,0.95); padding:40px 30px; border-radius:20px; border:1px solid #ff8c00; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.5); }
        .logo { width:90px; height:90px; border-radius:50%; border:2px solid #ff8c00; margin-bottom:20px; }
        h1 { color:#ff8c00; font-style:italic; font-size:1.8rem; text-transform:uppercase; margin-bottom:25px; }
        input { width:100%; padding:16px; margin-bottom:20px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:#000; color:#fff; font-size:16px; box-sizing:border-box; outline:none; }
        input:focus { border-color:#ff8c00; }
        button { width:100%; padding:18px; border-radius:12px; border:none; background:#ff8c00; color:#000; font-weight:900; cursor:pointer; text-transform:uppercase; font-size:1rem; transition:0.3s; }
        button:active { transform:scale(0.98); }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo">
        <h1>Dynasty Family's</h1>
        <input type="text" id="username" placeholder="Pseudo Discord..." autocomplete="off">
        <button onclick="start()">Accéder au Hub</button>
    </div>
    <script>
        function start() {
            const u = document.getElementById('username').value;
            if(u.trim().length > 2) { localStorage.setItem('user', u); window.location.href = "hub.html"; }
            else { alert("Pseudo invalide"); }
        }
    </script>
</body>
</html>
