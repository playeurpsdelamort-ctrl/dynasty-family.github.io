<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynasty Family’s - Recrutement</title>
    <style>
        :root { 
            --blue-glow: #38bdf8; 
            --bg-dark: #020617; 
            --card-bg: rgba(15, 23, 42, 0.8);
            --input-bg: #0f172a;
        }

        * { box-sizing: border-box; }

        body { 
            background: radial-gradient(circle at center, #1e293b 0%, var(--bg-dark) 100%); 
            color: white; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 10px;
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 700px; 
            margin: 20px auto;
            background: var(--card-bg); 
            backdrop-filter: blur(15px); 
            padding: 25px; 
            border-radius: 24px; 
            border: 1px solid rgba(56, 189, 248, 0.2); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
        }

        .logo-container { text-align: center; margin-bottom: 15px; }
        .logo-container img { 
            width: 100px; height: 100px; 
            border-radius: 50%; 
            border: 2px solid var(--blue-glow); 
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            object-fit: cover;
        }

        h1 { 
            color: var(--blue-glow); 
            text-align: center; 
            text-transform: uppercase; 
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin: 10px 0;
        }

        /* Système d'onglets (Tabs) */
        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: #64748b;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: var(--blue-glow);
            color: var(--bg-dark);
        }

        .form-content { display: none; animation: fadeIn 0.5s ease; }
        .form-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header { 
            color: var(--blue-glow); 
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            padding-bottom: 5px;
            margin-top: 30px;
        }

        label { display: block; margin-top: 18px; margin-bottom: 8px; font-size: 0.9rem; color: #cbd5e1; }
        
        textarea, input { 
            width: 100%; 
            padding: 12px; 
            background: var(--input-bg); 
            border: 1px solid #334155; 
            color: white; 
            border-radius: 10px; 
            font-size: 1rem;
            transition: 0.3s;
        }

        textarea:focus { border-color: var(--blue-glow); outline: none; background: #1e293b; }

        ::placeholder { color: #475569; font-style: italic; font-size: 0.85rem; }

        button[type="submit"] { 
            width: 100%; 
            margin-top: 30px; 
            padding: 18px; 
            background: var(--blue-glow); 
            border: none; 
            color: var(--bg-dark); 
            font-weight: 800; 
            border-radius: 12px; 
            cursor: pointer; 
            text-transform: uppercase;
            transition: 0.3s;
        }

        button[type="submit"]:hover { filter: brightness(1.2); transform: scale(1.02); }

        footer { text-align: center; margin-top: 30px; color: #475569; font-size: 0.75rem; }

        /* Ajustements mobiles spécifiques */
        @media (max-width: 480px) {
            .container { padding: 20px; border-radius: 0; margin: 0; }
            h1 { font-size: 1.2rem; }
            .tab-btn { font-size: 0.8rem; padding: 10px 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" alt="Logo Dynasty">
    </div>
    
    <h1>𝘿𝙮𝙣𝙖𝙨𝙩𝙮 𝙁𝙖𝙢𝙞𝙡𝙮’𝙨</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showForm('staff')">DEVENIR STAFF</button>
        <button class="tab-btn" onclick="showForm('partenaire')">PARTENARIAT</button>
    </div>

    <form id="form-staff" class="form-content active" action="https://formspree.io/f/xnjbrvez" method="POST">
        <input type="hidden" name="type_formulaire" value="Recrutement Staff">
        
        <div class="section-header">Identité</div>
        <label>Pseudo Discord & Âge</label>
        <input type="text" name="pseudo" placeholder="Ex: Luffy#0001 (18 ans)" required>

        <div class="section-header">Questionnaire Modération</div>
        <label>1. Présente ton parcours détaillé.</label>
        <textarea name="q1" rows="3" placeholder="Ex: Staff sur 3 serveurs Blox Fruits..." required></textarea>

        <label>2. Comment gères-tu un raid en pleine nuit ?</label>
        <textarea name="q2" rows="3" placeholder="Ex: Lockdown, mode lent et ban des suspects..." required></textarea>

        <label>3. Ton avis sur l'abus de pouvoir ?</label>
        <textarea name="q3" rows="3" placeholder="Ex: C'est une faute grave qui mérite un dérank..." required></textarea>

        <label>Note : Réponds avec soin pour maximiser tes chances.</label>

        <button type="submit">Envoyer ma candidature Staff</button>
    </form>

    <form id="form-partenaire" class="form-content" action="https://formspree.io/f/xnjbrvez" method="POST">
        <input type="hidden" name="type_formulaire" value="Demande Partenariat">

        <div class="section-header">Ton Projet</div>
        <label>Nom du serveur & Lien d'invitation</label>
        <input type="text" name="nom_serveur" placeholder="Ex: Mon Serveur RP (discord.gg/...)" required>

        <label>Nombre de membres</label>
        <input type="number" name="membres" placeholder="Ex: 500" required>

        <div class="section-header">Détails du Partenariat</div>
        <label>Pourquoi choisir la Dynasty Family’s ?</label>
        <textarea name="pourquoi" rows="4" placeholder="Décris tes motivations et ce que tu apportes..." required></textarea>

        <label>Quelles sont tes attentes (Pub, Event commun...) ?</label>
        <textarea name="attentes" rows="3" required></textarea>

        <button type="submit">Proposer le Partenariat</button>
    </form>

    <footer>© 2026 Dynasty Family’s • Système Mobile-Ready</footer>
</div>

<script>
    function showForm(type) {
        // Cacher tous les formulaires
        document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));
        // Enlever le style actif des boutons
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        // Afficher le bon formulaire
        document.getElementById('form-' + type).classList.add('active');
        // Activer le bouton cliqué
        event.currentTarget.classList.add('active');
    }
</script>

</body>
</html>
