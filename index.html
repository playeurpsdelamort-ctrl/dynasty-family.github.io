<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dynasty Family's - Accueil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="star-field"></div>

    <div class="flex-center">
        <div class="glass-card">
            <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo">
            <h1>Dynasty Family's</h1>

            <div id="view-candidat">
                <input type="text" id="pseudo" placeholder="Pseudo Discord">
                <button class="btn" onclick="start()">Commencer</button>
                <div class="link-small" onclick="toggle()">Accès Staff</div>
            </div>

            <div id="view-admin" style="display:none;">
                <input type="text" id="admin-user" placeholder="Login Admin">
                <input type="password" id="admin-pass" placeholder="Mot de passe">
                <button class="btn" onclick="login()">Connexion</button>
                <div class="link-small" onclick="toggle()">Retour</div>
            </div>
        </div>
    </div>

    <script src="script-stars.js"></script>
    <script>
        function toggle() {
            document.getElementById('view-candidat').style.display = document.getElementById('view-candidat').style.display === 'none' ? 'block' : 'none';
            document.getElementById('view-admin').style.display = document.getElementById('view-admin').style.display === 'none' ? 'block' : 'none';
        }
        function start() {
            const p = document.getElementById('pseudo').value;
            if(p.trim()) { localStorage.setItem('user', p); window.location.href = "hub.html"; }
        }
        function login() {
            if(document.getElementById('admin-user').value === "Admin" && document.getElementById('admin-pass').value === "Gear5") {
                localStorage.setItem('role', 'admin'); window.location.href = "admin-view.html";
            }
        }
    </script>
</body>
</html>
