<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynasty Family’s - Recrutement G5</title>
    <style>
        :root { 
            --gold: #fb923c; 
            --bg-dark: #020617; 
            --card-glass: rgba(15, 23, 42, 0.85);
            --text-main: #f1f5f9;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation;
        }

        /* FOND ESPACE PROFOND ÉTOILÉ */
        body { 
            background: #000;
            background-image: 
                radial-gradient(1px 1px at 25px 35px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 100px, #eee, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 120px 210px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 150px 40px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 200px 150px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 250px 80px, #fff, rgba(0,0,0,0)),
                linear-gradient(135deg, #020617 0%, #0f172a 100%);
            background-repeat: repeat;
            background-size: 250px 250px, 300px 300px, 350px 350px, 200px 200px, 400px 400px, 280px 280px, 100% 100%;
            color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 10px; min-height: 100vh;
            line-height: 1.5;
        }

        .container { width: 100%; max-width: 850px; margin: 0 auto; padding: 10px; position: relative; z-index: 5; }

        .header { text-align: center; margin-bottom: 25px; margin-top: 10px; }
        
        .logo { 
            width: 110px; height: 110px; /* Légèrement réduit pour mobile */
            border-radius: 50%; 
            border: 3px solid #fff; 
            box-shadow: 0 0 25px rgba(251, 146, 60, 0.6);
            object-fit: cover; 
            background: #000;
            margin-bottom: 15px;
        }

        h1 { color: var(--gold); font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; margin: 5px 0; font-weight: 900; }
        .subtitle { color: var(--gold); font-size: 0.75rem; text-transform: uppercase; font-weight: bold; opacity: 0.9; }

        /* Onglets adaptés mobile */
        .tab-switcher {
            display: flex; background: rgba(0,0,0,0.8); padding: 5px; 
            border-radius: 50px; margin-bottom: 25px; border: 1px solid var(--gold);
            position: sticky; top: 10px; z-index: 100; backdrop-filter: blur(10px);
        }
        .tab-btn {
            flex: 1; padding: 12px 5px; border: none; background: transparent; 
            color: #94a3b8; cursor: pointer; font-weight: 800; border-radius: 50px; 
            font-size: 0.75rem; text-transform: uppercase; transition: 0.3s;
        }
        .tab-btn.active { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        .form-content { display: none; }
        .form-content.active { display: block; animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: var(--card-glass); border-radius: 18px; 
            padding: 20px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px;
            backdrop-filter: blur(12px);
        }

        .group-title { 
            color: var(--gold); font-size: 0.85rem; font-weight: 900; 
            text-transform: uppercase; margin-bottom: 15px; 
            border-left: 3px solid var(--gold); padding-left: 10px;
        }

        label { display: block; margin-top: 20px; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600; color: #fff; line-height: 1.3; }
        
        input, textarea { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.4); 
            border: 1px solid #475569; color: #fff; border-radius: 10px; 
            font-size: 16px; /* Empêche le zoom auto sur iOS */
            outline: none; transition: 0.2s;
        }
        input:focus, textarea:focus { border-color: var(--gold); background: rgba(0,0,0,0.6); }

        .submit-btn { 
            width: 100%; padding: 18px; background: var(--gold); 
            border: none; color: #000; font-weight: 900; border-radius: 12px; 
            cursor: pointer; text-transform: uppercase; font-size: 1rem;
            box-shadow: 0 8px 20px rgba(251, 146, 60, 0.3); margin-top: 10px; 
            transition: 0.3s; margin-bottom: 40px;
        }
        .submit-btn:active { transform: scale(0.98); }

        footer { text-align: center; color: #94a3b8; font-size: 0.7rem; padding-bottom: 20px; }

        /* Optimisation pour les très petits écrans */
        @media (max-width: 360px) {
            h1 { font-size: 1.3rem; }
            .logo { width: 90px; height: 90px; }
            .glass-card { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" alt="Logo Gear 5" class="logo">
        <h1>𝘿𝙮𝙣𝙖𝙨𝙩𝙮 𝙁𝙖𝙢𝙞𝙡𝙮’ｓ</h1>
        <p class="subtitle">RECRUTEMENT G5 - ÉDITION MOBILE</p>
    </div>

    <div class="tab-switcher">
        <button class="tab-btn active" id="btn-mod" onclick="showForm('mod')">Modérateur</button>
        <button class="tab-btn" id="btn-anim" onclick="showForm('anim')">Animateur</button>
    </div>

    <div id="section-mod" class="form-content active">
        <form action="https://formspree.io/f/xnjbrvez" method="POST">
            <input type="hidden" name="Role" value="MODÉRATEUR">
            <div class="glass-card">
                <label>Pseudo Discord & Âge</label>
                <input type="text" name="identite" required placeholder="Ex: Luffy#0001 (19 ans)">
            </div>
            
            <div class="glass-card">
                <div class="group-title">Questions Modération</div>
                <label>1. Présente ton parcours Discord (ancienneté, rôles...).</label>
                <textarea name="m1" rows="3" required></textarea>
                <label>2. Une expérience de modération difficile ?</label>
                <textarea name="m2" rows="3" required></textarea>
                <label>3. Ta vision du rôle de modérateur ?</label>
                <textarea name="m3" rows="3" required></textarea>
                <label>4. Pourquoi toi plutôt qu'un autre ?</label>
                <textarea name="m4" rows="3" required></textarea>
                <label>5. Un membre important enfreint les règles, que fais-tu ?</label>
                <textarea name="m5" rows="3" required></textarea>
                <label>6. Comment gères-tu un raid soudain à 3h du matin ?</label>
                <textarea name="m6" rows="3" required></textarea>
                <label>7. Ton meilleur ami fait une faute grave, quelle sanction ?</label>
                <textarea name="m7" rows="3" required></textarea>
                <label>8. Es-tu à l'aise avec les bots (Dyno, Mee6, etc.) ?</label>
                <textarea name="m8" rows="2" required></textarea>
                <label>9. Tes disponibilités moyennes par jour ?</label>
                <input type="text" name="m9" required>
            </div>
            <button type="submit" class="submit-btn">Envoyer ma candidature</button>
        </form>
    </div>

    <div id="section-anim" class="form-content">
        <form action="https://formspree.io/f/xnjbrvez" method="POST">
            <input type="hidden" name="Role" value="ANIMATEUR">
            <div class="glass-card">
                <label>Pseudo Discord & Âge</label>
                <input type="text" name="identite" required placeholder="Ex: Brook#0001 (20 ans)">
            </div>

            <div class="glass-card">
                <div class="group-title">Questions Animation</div>
                <label>1. Depuis quand es-tu sur le serveur ?</label>
                <input type="text" name="a1" required>
                <label>2. Tes expériences en animation ?</label>
                <textarea name="a2" rows="3" required></textarea>
                <label>3. Propose une idée d'event originale pour le serveur.</label>
                <textarea name="a3" rows="4" required></textarea>
                <label>4. Un membre perturbe ton event, comment réagis-tu ?</label>
                <textarea name="a4" rows="3" required></textarea>
                <label>5. Sais-tu utiliser les salons vocaux pour animer ?</label>
                <textarea name="a5" rows="2" required></textarea>
                <label>6. Rédige une annonce d'event rapide (flash).</label>
                <textarea name="a6" rows="3" required></textarea>
                <label>7. Tes horaires de disponibilité ?</label>
                <input type="text" name="a7" required>
            </div>
            <button type="submit" class="submit-btn">Devenir Animateur</button>
        </form>
    </div>

    <footer>DYNASTY FAMILY’S © 2026</footer>
</div>

<script>
    function showForm(type) {
        const modSection = document.getElementById('section-mod');
        const animSection = document.getElementById('section-anim');
        const modBtn = document.getElementById('btn-mod');
        const animBtn = document.getElementById('btn-anim');

        if (type === 'mod') {
            modSection.classList.add('active');
            animSection.classList.remove('active');
            modBtn.classList.add('active');
            animBtn.classList.remove('active');
        } else {
            animSection.classList.add('active');
            modSection.classList.remove('active');
            animBtn.classList.add('active');
            modBtn.classList.add('active'); // Correction bouton actif
            modBtn.classList.remove('active');
            animBtn.classList.add('active');
        }
        // Remonte en haut du formulaire pour le confort mobile
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
