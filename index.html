<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynasty Family’s - Recrutement G5</title>
    <style>
        :root { 
            --gold: #fb923c; 
            --bg-dark: #020617; 
            --card-glass: rgba(15, 23, 42, 0.85);
            --text-main: #f1f5f9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: #000;
            background-image: 
                radial-gradient(1px 1px at 25px 35px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 100px, #eee, rgba(0,0,0,0)),
                linear-gradient(135deg, #020617 0%, #0f172a 100%);
            background-repeat: repeat;
            background-size: 250px 250px, 300px 300px, 100% 100%;
            color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 10px; min-height: 100vh;
        }

        .container { width: 100%; max-width: 850px; margin: 0 auto; padding: 10px; position: relative; z-index: 5; }

        .header { text-align: center; margin-bottom: 25px; }
        .logo { 
            width: 120px; height: 120px; border-radius: 50%; 
            border: 3px solid #fff; box-shadow: 0 0 30px rgba(251, 146, 60, 0.7);
            object-fit: cover; background: #000; margin-bottom: 15px;
        }

        .form-title {
            text-align: center;
            color: var(--gold);
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        h1 { color: var(--gold); font-size: 1.6rem; text-transform: uppercase; letter-spacing: 3px; margin: 5px 0; font-weight: 900; text-align: center; }
        .subtitle { color: var(--gold); font-size: 0.8rem; text-transform: uppercase; font-weight: bold; text-align: center; display: block; }

        /* BOUTONS CENTRÉS */
        .tab-switcher-container {
            display: flex;
            justify-content: center; /* Centre les boutons horizontalement */
            width: 100%;
            margin-bottom: 25px;
        }

        .tab-switcher {
            display: flex; 
            background: rgba(0,0,0,0.9); 
            padding: 5px; 
            border-radius: 50px; 
            border: 1px solid var(--gold);
            position: sticky; 
            top: 10px; 
            z-index: 100; 
            backdrop-filter: blur(10px);
            max-width: 100%;
            overflow-x: auto; /* Permet le défilement si trop de boutons sur petit mobile */
            scrollbar-width: none;
        }
        .tab-switcher::-webkit-scrollbar { display: none; }

        .tab-btn {
            flex: 0 0 auto; /* Empêche les boutons de s'écraser */
            padding: 12px 18px; 
            border: none; 
            background: transparent; 
            color: #94a3b8; 
            cursor: pointer; 
            font-weight: 800; 
            border-radius: 50px; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            transition: 0.3s;
            white-space: nowrap;
        }
        .tab-btn.active { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }

        .form-content { display: none; }
        .form-content.active { display: block; animation: fadeIn 0.4s ease forwards; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: var(--card-glass); border-radius: 20px; 
            padding: 20px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); margin-bottom: 25px;
        }

        .category-header { 
            color: #000; background: var(--gold); font-size: 0.85rem; font-weight: 900; 
            text-transform: uppercase; margin: -20px -20px 20px -20px; 
            padding: 12px; border-radius: 18px 18px 0 0;
        }

        label { display: block; margin-top: 20px; margin-bottom: 10px; font-size: 0.95rem; font-weight: 600; color: #fff; line-height: 1.4; }
        
        input, textarea { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.5); 
            border: 1px solid #475569; color: #fff; border-radius: 12px; 
            font-size: 16px; outline: none;
        }

        .submit-btn { 
            width: 100%; padding: 20px; background: var(--gold); 
            border: none; color: #000; font-weight: 900; border-radius: 15px; 
            cursor: pointer; text-transform: uppercase; font-size: 1.1rem;
            box-shadow: 0 10px 25px rgba(251, 146, 60, 0.4); margin-bottom: 50px;
        }

        .staff-tag { color: var(--gold); font-weight: bold; display: block; margin: 20px 0; text-align: center; }

        footer { text-align: center; color: #94a3b8; font-size: 0.7rem; padding-bottom: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" alt="Logo" class="logo">
        <h1>𝘿𝙮𝙣𝙖𝙨𝙩𝙮 𝙁𝙖𝙢𝙞𝙡𝙮’ｓ</h1>
        <span class="subtitle">RECRUTEMENT G5</span>
    </div>

    <div class="form-title">FORMULAIRES</div>

    <div class="tab-switcher-container">
        <div class="tab-switcher">
            <button class="tab-btn active" onclick="showForm('bot', event)">Bot Manager</button>
            <button class="tab-btn" onclick="showForm('mod', event)">Modo Test</button>
            <button class="tab-btn" onclick="showForm('mid', event)">Middleman</button>
            <button class="tab-btn" onclick="showForm('anim', event)">Anim Test</button>
        </div>
    </div>

    <form action="https://formspree.io/f/xnjbrvez" method="POST">
        
        <div id="section-bot" class="form-content active">
            <input type="hidden" name="Role" value="BOT MANAGER">
            <div class="glass-card">
                <div class="category-header">I. Architecture & Hébergement</div>
                <label>1. Analyse comparativement une architecture self-hosted, cloud-managed et serverless...</label>
                <textarea name="bot_q1" required></textarea>
                </div>
            <button type="submit" class="submit-btn">Envoyer Bot Manager</button>
        </div>

        <div id="section-mod" class="form-content">
            <input type="hidden" name="Role" value="MODERATEUR TEST">
            <div class="glass-card">
                <div class="category-header">I. Parcours & Expérience</div>
                <label>1. Présente ton parcours sur Discord de manière détaillée...</label>
                <textarea name="mod_q1" required></textarea>
                </div>
            <button type="submit" class="submit-btn">Envoyer Modo Test</button>
        </div>

        <div id="section-mid" class="form-content">
            <input type="hidden" name="Role" value="MIDDLEMAN">
            <div class="glass-card">
                <div class="category-header">Informations Middleman</div>
                <label>Disponibilités précises (heures/jours) :</label>
                <input type="text" name="mid_disp" required>
                <label>Depuis combien de temps joues-tu à Blox Fruits ?</label>
                <input type="text" name="mid_lvl" required>
            </div>
            <button type="submit" class="submit-btn">Envoyer Middleman</button>
        </div>

        <div id="section-anim" class="form-content">
            <input type="hidden" name="Role" value="ANIMATEUR TEST">
            <div class="glass-card">
                <div class="category-header">Motivation & Créativité</div>
                <label>Pourquoi souhaites-tu devenir animateur ici ?</label>
                <textarea name="anim_q1" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Envoyer Animateur Test</button>
        </div>

    </form>

    <div class="staff-tag">@🛡️ STAFF</div>
    <footer>DYNASTY FAMILY’S © 2026</footer>
</div>

<script>
    function showForm(type, event) {
        // Cacher tous les formulaires
        const sections = document.querySelectorAll('.form-content');
        sections.forEach(s => s.classList.remove('active'));
        
        // Afficher le bon
        document.getElementById('section-' + type).classList.add('active');
        
        // Gérer les classes actives sur les boutons
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
