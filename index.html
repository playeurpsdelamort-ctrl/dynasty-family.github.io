<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dynasty Family’s - Connexion</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; }
        .login-box { max-width: 400px; text-align: center; }
        .logo { width: 100px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="glass-card login-box">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo">
        <h1>Connexion</h1>
        <input type="text" id="user" placeholder="Pseudo Discord">
        <br><br>
        <input type="password" id="pass" placeholder="Code d'accès">
        <br><br>
        <button class="btn" onclick="login()">Entrer</button>
        <p id="error" style="color:red; display:none; margin-top:15px;">Accès refusé.</p>
    </div>

    <script>
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "Admin_Dynasty" && p === "ADMIN_GOLD") {
                localStorage.setItem('user', u);
                window.location.href = "admin-view.html";
            } else if(p === "G5_DYNASTY") {
                localStorage.setItem('user', u);
                window.location.href = "hub.html";
            } else { document.getElementById('error').style.display='block'; }
        }
    </script>
</body>
</html>
