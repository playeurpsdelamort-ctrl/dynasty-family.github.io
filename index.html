<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dynasty Family's - Recrutement</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="star-field"></div>
    <div class="container">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo">
        <h1>Dynasty Family’s</h1>
        <div class="subtitle">RECRUTEMENT DIVINEMENT FUN</div>

        <div class="glass-card">
            <div id="view-candidat">
                <input type="text" id="pseudo" placeholder="Ton Pseudo Discord">
                <button class="btn" onclick="start()">Entrer</button>
                <a class="staff-link" onclick="toggle()">Accès Staff</a>
            </div>

            <div id="view-admin" style="display:none;">
                <input type="text" id="admin-user" placeholder="Identifiant">
                <input type="password" id="admin-pass" placeholder="Mot de passe">
                <button class="btn" style="background: white;" onclick="login()">Connexion Staff</button>
                <a class="staff-link" onclick="toggle()">Retour</a>
            </div>
        </div>
    </div>

    <script src="script-stars.js"></script>
    <script>
        function toggle() {
            const cv = document.getElementById('view-candidat');
            const av = document.getElementById('view-admin');
            cv.style.display = cv.style.display === 'none' ? 'block' : 'none';
            av.style.display = av.style.display === 'none' ? 'block' : 'none';
        }

        function start() {
            const p = document.getElementById('pseudo').value.trim();
            if(p) { localStorage.setItem('user', p); window.location.href = "hub.html"; }
        }

        function login() {
            const u = document.getElementById('admin-user').value.trim();
            const p = document.getElementById('admin-pass').value.trim();
            if(u === "admin" && p === ".9R4yEsXeNz-FCtQTx6Q") {
                localStorage.setItem('role', 'admin');
                window.location.href = "admin-view.html";
            } else { alert("Erreur d'identifiants."); }
        }
    </script>
</body>
</html>
