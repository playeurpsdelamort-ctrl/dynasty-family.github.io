<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynasty Family’s - Recrutement</title>
    <style>
        :root { 
            --gold: #fb923c; 
            --bg-dark: #020617; 
            --card-glass: rgba(15, 23, 42, 0.85);
            --text-main: #f1f5f9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* Fond Espace Profond Animé */
        body { 
            background: #000;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
                linear-gradient(135deg, #020617 0%, #0f172a 100%);
            background-repeat: repeat;
            background-size: 200px 200px, 150px 150px, 250px 250px, 300px 300px, 120px 120px, 100% 100%;
            color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 10px; min-height: 100vh;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 850px; margin: 10px auto; padding: 20px 10px; position: relative; z-index: 5; }

        .header { text-align: center; margin-bottom: 30px; }
        .logo { 
            width: 120px; height: 120px; border-radius: 50%; 
            border: 3px solid #fff; box-shadow: 0 0 30px rgba(251, 146, 60, 0.6);
            object-fit: cover; background: #000;
        }
        h1 { color: var(--gold); font-size: 1.8rem; text-transform: uppercase; letter-spacing: 3px; margin: 15px 0 5px; font-weight: 900; }
        .subtitle { color: var(--gold); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }

        /* --- Tabs --- */
        .tab-switcher {
            display: flex; background: rgba(0,0,0,0.7); padding: 6px; 
            border-radius: 50px; margin-bottom: 30px; border: 1px solid var(--gold);
            position: relative; z-index: 10;
        }
        .tab-btn {
            flex: 1; padding: 15px; border: none; background: transparent; 
            color: #94a3b8; cursor: pointer; font-weight: 800; border-radius: 50px; 
            font-size: 0.85rem; text-transform: uppercase; transition: 0.3s;
        }
        .tab-btn.active { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }

        /* --- Formulaires --- */
        .form-content { display: none; }
        .form-content.active { display: block; animation: fadeIn 0.5s ease forwards; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: var(--card-glass); border-radius: 20px; 
            padding: 25px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); margin-bottom: 25px;
            backdrop-filter: blur(12px);
        }

        .group-title { 
            color: var(--gold); font-size: 0.9rem; font-weight: 900; 
            text-transform: uppercase; margin-bottom: 20px; 
            border-bottom: 2px solid var(--gold); padding-bottom: 8px;
        }

        label { display: block; margin-top: 25px; margin-bottom: 10px; font-size: 0.95rem; font-weight: 600; color: #fff; }
        input, textarea { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.5); 
            border: 1px solid #475569; color: #fff; border-radius: 12px; font-size: 1rem;
        }
        input:focus, textarea:focus { border-color: var(--gold); outline: none; background: rgba(0,0,0,0.7); }

        .submit-btn { 
            width: 100%; padding: 22px; background: var(--gold); 
            border: none; color: #000; font-weight: 900; border-radius: 50px; 
            cursor: pointer; text-transform: uppercase; font-size: 1.1rem;
            box-shadow: 0 10px 25px rgba(251, 146, 60, 0.4); margin-top: 10px;
        }

        footer { text-align: center; margin-top: 40px; color: #94a3b8; font-size: 0.75rem; padding-bottom: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="dinastyfamilli.jpg" alt="Logo Gear 5" class="logo">
        <h1>𝘿𝙮𝙣𝙖𝙨𝙩𝙮 𝙁𝙖𝙢𝙞𝙡𝙮’ｓ</h1>
        <p class="subtitle">RECRUTEMENT DIVINEMENT FUN</p>
    </div>

    <div class="tab-switcher">
        <button class="tab-btn active" id="btn-mod" onclick="showForm('mod')">Devenir Modo</button>
        <button class="tab-btn" id="btn-anim" onclick="showForm('anim')">Devenir Anim</button>
    </div>

    <div id="section-mod" class="form-content active">
        <form action="https://formspree.io/f/xnjbrvez" method="POST">
            <input type="hidden" name="Candidature" value="MODÉRATEUR">
            <div class="glass-card">
                <label>Pseudo Discord & Âge</label>
                <input type="text" name="identite" required placeholder="Luffy#1234 (19 ans)">
            </div>
            <div class="glass-card">
                <div class="group-title">QUESTIONS DE MODÉRATION (1-22)</div>
                <label>1. Présente ton parcours sur Discord (ancienneté, serveurs, rôles...).</label>
                <textarea name="q1" required></textarea>
                <label>2. Décris une expérience de modération difficile.</label>
                <textarea name="q2" required></textarea>
                <label>22. Quelles améliorations proposerais-tu ?</label>
                <textarea name="q22" required></textarea>
            </div>
            <button type="submit" class="submit-btn">SOUMETTRE CANDIDATURE DIVINE</button>
        </form>
    </div>

    <div id="section-anim" class="form-content">
        <form action="https://formspree.io/f/xnjbrvez" method="POST">
            <input type="hidden" name="Candidature" value="ANIMATEUR">
            <div class="glass-card">
                <label>Pseudo Discord & Âge</label>
                <input type="text" name="identite" required placeholder="Brook#1234 (20 ans)">
            </div>
            <div class="glass-card">
                <div class="group-title">QUESTIONS D'ANIMATION (1-21)</div>
                <label>1. Depuis combien de temps es-tu sur le serveur ?</label>
                <input type="text" name="a1" required>
                <label>10. Propose une idée d’animation originale détaillée.</label>
                <textarea name="a10" required></textarea>
                <label>21. Sais-tu gérer les permissions de salons ?</label>
                <textarea name="a21" required></textarea>
            </div>
            <button type="submit" class="submit-btn">POSTULER POUR L'AMBIANCE G5</button>
        </form>
    </div>

    <footer>DYNASTY FAMILY’S © 2026</footer>
</div>

<script>
    function showForm(type) {
        // Sélection des éléments
        const modSection = document.getElementById('section-mod');
        const animSection = document.getElementById('section-anim');
        const modBtn = document.getElementById('btn-mod');
        const animBtn = document.getElementById('btn-anim');

        if (type === 'mod') {
            modSection.classList.add('active');
            animSection.classList.remove('active');
            modBtn.classList.add('active');
            animBtn.classList.remove('active');
        } else {
            animSection.classList.add('active');
            modSection.classList.remove('active');
            animBtn.classList.add('active');
            modBtn.classList.remove('active');
        }
        // Retour en haut de page lors du changement
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
