<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynasty Family’s - Recrutement</title>
    <style>
        :root { 
            --accent: #38bdf8; 
            --accent-glow: rgba(56, 189, 248, 0.4);
            --bg: #020617; 
            --card: rgba(15, 23, 42, 0.85);
            --border: rgba(56, 189, 248, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: radial-gradient(circle at top right, #1e293b 0%, var(--bg) 100%); 
            color: #f1f5f9; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 10px;
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 750px; 
            margin: 10px auto;
            background: var(--card); 
            backdrop-filter: blur(20px); 
            padding: 30px 20px; 
            border-radius: 28px; 
            border: 1px solid var(--border); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .logo { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--accent); box-shadow: 0 0 25px var(--accent-glow); object-fit: cover; }
        
        h1 { color: var(--accent); font-size: 1.6rem; text-transform: uppercase; letter-spacing: 4px; margin: 15px 0 5px; font-weight: 900; }
        .subtitle { color: #94a3b8; font-size: 0.85rem; margin-bottom: 25px; }

        /* Navigation Onglets */
        .tab-switcher {
            display: flex;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px;
            border-radius: 18px;
            margin-bottom: 30px;
            gap: 5px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 14px 5px;
            border: none;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            font-weight: 800;
            border-radius: 12px;
            font-size: 0.75rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #020617;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* Formulaires */
        .form-content { display: none; animation: slideUp 0.5s ease; }
        .form-content.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .group-title { color: var(--accent); font-size: 0.8rem; font-weight: 900; text-transform: uppercase; margin: 35px 0 15px; border-left: 4px solid var(--accent); padding-left: 10px; }

        label { display: block; margin-top: 20px; margin-bottom: 10px; font-size: 0.9rem; color: #e2e8f0; font-weight: 600; line-height: 1.4; }
        
        input, textarea { 
            width: 100%; padding: 15px; background: rgba(15, 23, 42, 0.7); 
            border: 1px solid #334155; color: #fff; border-radius: 14px; 
            font-size: 1rem; outline: none; transition: 0.3s;
        }

        input:focus, textarea:focus { border-color: var(--accent); background: rgba(30, 41, 59, 0.9); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }

        ::placeholder { color: #4b5563; font-style: italic; font-size: 0.9rem; }

        .submit-btn { 
            width: 100%; padding: 22px; background: var(--accent); border: none; 
            color: #020617; font-weight: 900; border-radius: 18px; cursor: pointer; 
            text-transform: uppercase; font-size: 1rem; margin-top: 30px;
            box-shadow: 0 10px 25px -10px var(--accent-glow);
        }

        footer { text-align: center; margin-top: 40px; color: #475569; font-size: 0.75rem; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" alt="Logo" class="logo">
        <h1>𝘿𝙮𝙣𝙖𝙨𝙩𝙮 𝙁𝙖𝙢𝙞𝙡𝙮’𝙨</h1>
        <p class="subtitle">⚓ Choisissez votre voie dans l'équipage ⚓</p>
    </div>

    <div class="tab-switcher">
        <button class="tab-btn active" id="btn-mod" onclick="switchTab('mod')">MODÉRATEUR</button>
        <button class="tab-btn" id="btn-anim" onclick="switchTab('anim')">ANIMATEUR</button>
        <button class="tab-btn" id="btn-part" onclick="switchTab('part')">PARTENAIRE</button>
    </div>

    <form id="form-mod" class="form-content active" action="https://formspree.io/f/xnjbrvez" method="POST">
        <input type="hidden" name="Role" value="MODERATEUR">
        <div class="group-title">IDENTITÉ</div>
        <input type="text" name="pseudo" placeholder="Pseudo Discord & Âge" required>

        <div class="group-title">SÉCURITÉ & DISCIPLINE</div>
        <label>1. Présente ton parcours détaillé.</label>
        <textarea name="q1" rows="3" placeholder="Expériences précédentes..." required></textarea>
        
        <label>2. Comment gères-tu un raid ?</label>
        <textarea name="q2" rows="3" required></textarea>

        <label>3. Ta vision de l'abus de pouvoir ?</label>
        <textarea name="q3" rows="3" required></textarea>

        <label>4. Comment différencies-tu un troll d'un membre problématique ?</label>
        <textarea name="q4" rows="3" required></textarea>

        <button type="submit" class="submit-btn">Postuler pour la Modération</button>
    </form>

    <form id="form-anim" class="form-content" action="https://formspree.io/f/xnjbrvez" method="POST">
        <input type="hidden" name="Role" value="ANIMATEUR">
        <div class="group-title">AMBIANCE & EVENTS</div>
        <input type="text" name="pseudo" placeholder="Pseudo Discord & Âge" required>

        <label>1. Quelles idées d'événements as-tu pour la Dynasty ?</label>
        <textarea name="idees" rows="4" placeholder="Quiz, Tournois Blox Fruits, Karaoké..." required></textarea>

        <label>2. Es-tu à l'aise pour parler en vocal devant 50 personnes ?</label>
        <textarea name="vocal" rows="3" required></textarea>

        <label>3. Quel est ton matériel (Micro, PC/Tel) ?</label>
        <textarea name="matos" rows="2" required></textarea>

        <button type="submit" class="submit-btn">Devenir Animateur</button>
    </form>

    <form id="form-part" class="form-content" action="https://formspree.io/f/xnjbrvez" method="POST">
        <input type="hidden" name="Role" value="PARTENARIAT">
        <div class="group-title">VOTRE PROJET</div>
        <input type="text" name="nom_serveur" placeholder="Nom du serveur & Lien" required>
        
        <label>Combien de membres avez-vous ?</label>
        <input type="number" name="membres" required>

        <label>Pourquoi choisir la Dynasty Family’s ?</label>
        <textarea name="pourquoi" rows="4" required></textarea>

        <button type="submit" class="submit-btn">Envoyer la proposition</button>
    </form>

    <footer>DYNASTY FAMILY’S © 2026<br>ALL RIGHTS RESERVED</footer>
</div>

<script>
    function switchTab(type) {
        document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        if(type === 'mod') {
            document.getElementById('form-mod').classList.add('active');
            document.getElementById('btn-mod').classList.add('active');
        } else if(type === 'anim') {
            document.getElementById('form-anim').classList.add('active');
            document.getElementById('btn-anim').classList.add('active');
        } else {
            document.getElementById('form-part').classList.add('active');
            document.getElementById('btn-part').classList.add('active');
        }
    }
</script>

</body>
</html>
