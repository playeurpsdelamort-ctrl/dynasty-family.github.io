<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynasty Family's | Gear 5 Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="stars-container" id="stars"></div>

    <div class="login-card">
        <div class="logo-wrapper">
            <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo" alt="Luffy Gear 5">
        </div>

        <h1>Dynasty Family</h1>

        <div id="view-candidat">
            <input type="text" id="pseudo" placeholder="Ton Pseudo Discord">
            <button class="btn" onclick="goToHub()">Postuler</button>
            <span class="staff-link" onclick="toggleView()">Accès Administration</span>
        </div>

        <div id="view-admin" style="display:none;">
            <input type="text" id="admin-user" placeholder="Identifiant Staff">
            <input type="password" id="admin-pass" placeholder="Mot de passe">
            <button class="btn" style="background:#fff" onclick="loginAdmin()">Connexion Staff</button>
            <span class="staff-link" onclick="toggleView()">Retour</span>
        </div>
    </div>

    <script>
        // Générateur d'étoiles
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starsContainer.appendChild(star);
        }

        function toggleView() {
            const cv = document.getElementById('view-candidat');
            const av = document.getElementById('view-admin');
            cv.style.display = cv.style.display === 'none' ? 'block' : 'none';
            av.style.display = av.style.display === 'none' ? 'block' : 'none';
        }

        function goToHub() {
            const p = document.getElementById('pseudo').value.trim();
            if(p !== "") {
                localStorage.setItem('user', p);
                window.location.href = "hub.html";
            } else { alert("Indique ton pseudo Discord !"); }
        }

        function loginAdmin() {
            const u = document.getElementById('admin-user').value;
            const p = document.getElementById('admin-pass').value;
            if(u === "Staff_Dyna" && p === "Gear5") {
                localStorage.setItem('role', 'admin');
                window.location.href = "admin-view.html";
            } else { alert("Accès refusé."); }
        }
    </script>
</body>
</html>
