<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynasty Family’s - Recrutement</title>
    <style>
        :root { 
            --gold: #fb923c; 
            --bg-dark: #020617; 
            --card-glass: rgba(15, 23, 42, 0.85);
            --text-main: #f1f5f9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* Effet fond étoilé */
        body { 
            background: var(--bg-dark);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 10px; min-height: 100vh;
        }

        .container { width: 100%; max-width: 850px; margin: 10px auto; padding: 20px 10px; position: relative; z-index: 1; }

        .header { text-align: center; margin-bottom: 30px; }
        .logo { 
            width: 125px; height: 125px; border-radius: 50%; 
            border: 3px solid #fff; box-shadow: 0 0 25px rgba(251, 146, 60, 0.6);
            object-fit: cover; background: #000;
        }
        h1 { color: var(--gold); font-size: 1.8rem; text-transform: uppercase; letter-spacing: 3px; margin: 15px 0 5px; font-weight: 900; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .subtitle { color: var(--gold); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; opacity: 0.9; }

        .tab-switcher {
            display: flex; background: rgba(0,0,0,0.6); padding: 5px; 
            border-radius: 50px; margin-bottom: 30px; border: 1px solid rgba(251, 146, 60, 0.3);
        }
        .tab-btn {
            flex: 1; padding: 14px; border: none; background: transparent; 
            color: #94a3b8; cursor: pointer; font-weight: 800; border-radius: 50px; 
            font-size: 0.8rem; text-transform: uppercase; transition: 0.3s;
        }
        .tab-btn.active { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        .form-content { display: none; animation: fadeIn 0.6s ease; }
        .form-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card {
            background: var(--card-glass); border-radius: 20px; 
            padding: 25px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .group-title { 
            color: var(--gold); font-size: 0.9rem; font-weight: 900; 
            text-transform: uppercase; margin-bottom: 20px; 
            border-bottom: 2px solid var(--gold); padding-bottom: 8px;
        }

        label { display: block; margin-top: 25px; margin-bottom: 10px; font-size: 0.95rem; font-weight: 600; color: #fff; }
        input, textarea { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.4); 
            border: 1px solid #475569; color: #fff; border-radius: 12px; font-size: 1rem;
        }
        input:focus, textarea:focus { border-color: var(--gold); outline: none; background: rgba(0,0,0,0.6); }

        .submit-btn { 
            width: 100%; padding: 22px; background: var(--gold); 
            border: none; color: #000; font-weight: 900; border-radius: 50px; 
            cursor: pointer; text-transform: uppercase; font-size: 1.1rem;
            box-shadow: 0 8px 20px rgba(251, 146, 60, 0.4); transition: 0.3s;
        }
        .submit-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        footer { text-align: center; margin-top: 40px; color: #94a3b8; font-size: 0.8rem; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="dinastyfamilli.jpg" alt="Logo Gear 5" class="logo">
        <h1>𝘿𝙮𝙣𝙖𝙨𝙩𝙮 𝙁𝙖𝙢𝙞𝙡𝙮’ｓ</h1>
        <p class="subtitle">RECRUTEMENT DIVINEMENT FUN</p>
    </div>

    <div class="tab-switcher">
        <button class="tab-btn active" id="btn-mod" onclick="switchTab('mod')">Devenir Modo</button>
        <button class="tab-btn" id="btn-anim" onclick="switchTab('anim')">Devenir Anim</button>
    </div>

    <form id="form-mod" class="form-content active" action="https://formspree.io/f/xnjbrvez" method="POST">
        <input type="hidden" name="Role" value="MODERATEUR">
        <div class="glass-card">
            <label>Pseudo Discord & Âge</label>
            <input type="text" name="identite" required placeholder="Ex: Luffy#1234 (19 ans)">
        </div>
        <div class="glass-card">
            <div class="group-title">I. PARCOURS & EXPÉRIENCE</div>
            <label>1. Présente ton parcours sur Discord de manière détaillée (ancienneté, types de serveurs, rôles...).</label>
            <textarea name="m1" required></textarea>
            <label>2. Décris une expérience concrète de modération difficile et tes décisions stratégiques.</label>
            <textarea name="m2" required></textarea>
            <label>3. As-tu déjà participé à l’élaboration d’un règlement ? Explique ta méthodologie.</label>
            <textarea name="m3" required></textarea>
        </div>
        <div class="glass-card">
            <div class="group-title">II. MOTIVATION & VISION</div>
            <label>4. Quelle est ta conception du rôle de modérateur au sein d’une communauté structurée ?</label>
            <textarea name="m4" required></textarea>
            <label>5. En quoi ta candidature se distingue-t-elle des autres ?</label>
            <textarea name="m5" required></textarea>
            <label>6. Quelle est la frontière entre autorité légitime et abus de pouvoir ?</label>
            <textarea name="m6" required></textarea>
            <label>7. Comment contribues-tu à instaurer un climat sain dans une communauté ?</label>
            <textarea name="m7" required></textarea>
        </div>
        <div class="glass-card">
            <div class="group-title">III. ANALYSE & GESTION</div>
            <label>8. Un membre influent enfreint le règlement. Quelle stratégie adoptes-tu ?</label>
            <textarea name="m8" required></textarea>
            <label>9. Deux membres se provoquent mutuellement. Comment établis-tu les responsabilités ?</label>
            <textarea name="m9" required></textarea>
            <label>10. Un membre conteste publiquement une sanction. Comment gères-tu cela ?</label>
            <textarea name="m10" required></textarea>
