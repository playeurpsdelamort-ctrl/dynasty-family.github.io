<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recrutement - Dynasty Family’s</title>
    <style>
        body { background: radial-gradient(circle, #1e293b 0%, #020617 100%); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo img { width: 120px; height: 120px; border-radius: 50%; border: 2px solid #38bdf8; }
        h1 { color: #38bdf8; text-align: center; text-transform: uppercase; letter-spacing: 3px; }
        .section-header { background: rgba(56, 189, 248, 0.1); color: #38bdf8; padding: 10px; border-radius: 5px; margin-top: 30px; font-weight: bold; text-transform: uppercase; border-left: 4px solid #38bdf8; }
        label { display: block; margin-top: 20px; margin-bottom: 8px; font-size: 0.9em; color: #e2e8f0; }
        textarea, input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; margin-top: 40px; padding: 18px; background: #38bdf8; border: none; color: #020617; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #7dd3fc; transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <img src="https://via.placeholder.com/120" alt="Logo Dynasty">
    </div>
    <h1>𝘿𝙮𝙣𝙖𝙨𝙩𝙮 𝙁𝙖𝙢𝙞𝙡𝙮’𝙨</h1>
    <form action="https://formspree.io/f/xnjbrvez" method="POST">
        <div class="section-header">I. Parcours & Expérience</div>
        <label>1. Présente ton parcours Discord détaillé.</label>
        <textarea name="q1" rows="3" required></textarea>
        
        <label>2. Décris une modération difficile.</label>
        <textarea name="q2" rows="3" required></textarea>

        <button type="submit">Envoyer ma candidature</button>
    </form>
</div>
</body>
</html>
