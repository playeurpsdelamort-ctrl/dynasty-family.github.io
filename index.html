<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynasty Family’s - Recrutement G5</title>
    <style>
        :root { 
            --gold: #fb923c; 
            --bg-dark: #020617; 
            --card-glass: rgba(15, 23, 42, 0.85);
            --text-main: #f1f5f9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* Fond Espace Profond Étoilé */
        body { 
            background: #000;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
                linear-gradient(135deg, #020617 0%, #0f172a 100%);
            background-repeat: repeat;
            background-size: 200px 200px, 150px 150px, 250px 250px, 300px 300px, 120px 120px, 100% 100%;
            color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 10px; min-height: 100vh;
        }

        .container { width: 100%; max-width: 850px; margin: 10px auto; padding: 20px 10px; position: relative; z-index: 5; }

        .header { text-align: center; margin-bottom: 30px; }
        .logo { 
            width: 130px; height: 130px; border-radius: 50%; 
            border: 3px solid #fff; box-shadow: 0 0 30px rgba(251, 146, 60, 0.6);
            object-fit: cover; background: #000;
        }
        h1 { color: var(--gold); font-size: 1.8rem; text-transform: uppercase; letter-spacing: 3px; margin: 15px 0 5px; font-weight: 900; }
        .subtitle { color: var(--gold); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }

        /* --- Onglets --- */
        .tab-switcher {
            display: flex; background: rgba(0,0,0,0.7); padding: 6px; 
            border-radius: 50px; margin-bottom: 30px; border: 1px solid var(--gold);
        }
        .tab-btn {
            flex: 1; padding: 15px; border: none; background: transparent; 
            color: #94a3b8; cursor: pointer; font-weight: 800; border-radius: 50px; 
            font-size: 0.85rem; text-transform: uppercase; transition: 0.3s;
        }
        .tab-btn.active { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }

        /* --- Sections --- */
        .form-content { display: none; }
        .form-content.active { display: block; animation: fadeIn 0.5s ease forwards; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: var(--card-glass); border-radius: 20px; 
            padding: 25px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); margin-bottom: 25px;
            backdrop-filter: blur(12px);
        }

        .group-title { 
            color: var(--gold); font-size: 0.9rem; font-weight: 900; 
            text-transform: uppercase; margin-bottom: 20px; 
            border-bottom: 2px solid var(--gold); padding-bottom: 8px;
        }

        label { display: block; margin-top: 25px; margin-bottom: 10px; font-size: 0.95rem; font-weight: 600; color: #fff; }
        input, textarea { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.5); 
            border: 1px solid #475569; color: #fff; border-radius: 12px; font-size: 1rem; outline: none;
        }
        input:focus, textarea:focus { border-color: var(--gold); background: rgba(0,0,0,0.7); }

        .submit-btn { 
            width: 100%; padding: 22px; background: var(--gold); 
            border: none; color: #000; font-weight: 900; border-radius: 50px; 
            cursor: pointer; text-transform: uppercase; font-size: 1.1rem;
            box-shadow: 0 10px 25px rgba(251, 146, 60, 0.4); margin-top: 10px; transition: 0.3s;
        }
        .submit-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        footer { text-align: center; margin-top: 40px; color: #94a3b8; font-size: 0.75rem; padding-bottom: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="dinastyfamilli.jpg" alt="Logo Gear 5" class="logo">
        <h1>𝘿𝙮𝙣𝙖𝙨𝙩𝙮 𝙁𝙖𝙢𝙞𝙡𝙮’𝙨</h1>
        <p class="subtitle">RECRUTEMENT DIVINEMENT FUN</p>
    </div>

    <div class="tab-switcher">
        <button class="tab-btn active" id="btn-mod" onclick="showForm('mod')">Devenir Modo</button>
        <button class="tab-btn" id="btn-anim" onclick="showForm('anim')">Devenir Anim</button>
    </div>

    <div id="section-mod" class="form-content active">
        <form action="https://formspree.io/f/xnjbrvez" method="POST">
            <input type="hidden" name="Candidature" value="MODÉRATEUR">
            
            <div class="glass-card">
                <label>Pseudo Discord & Âge</label>
                <input type="text" name="identite" required placeholder="Luffy#1234 (19 ans)">
            </div>

            <div class="glass-card">
                <div class="group-title">I. PARCOURS & EXPÉRIENCE</div>
                <label>1. Présente ton parcours sur Discord de manière détaillée (ancienneté, types de serveurs, rôles...).</label>
                <textarea name="m1" required></textarea>
                <label>2. Décris une expérience concrète de modération difficile et tes décisions stratégiques.</label>
                <textarea name="m2" required></textarea>
                <label>3. As-tu déjà participé à l’élaboration d’un règlement ? Explique ta méthodologie.</label>
                <textarea name="m3" required></textarea>
            </div>

            <div class="glass-card">
                <div class="group-title">II. MOTIVATION & VISION</div>
                <label>4. Quelle est ta conception du rôle de modérateur au sein d’une communauté structurée ?</label>
                <textarea name="m4" required></textarea>
                <label>5. En quoi ta candidature se distingue-t-elle des autres ?</label>
                <textarea name="m5" required></textarea>
                <label>6. Quelle est la frontière entre autorité légitime et abus de pouvoir ?</label>
                <textarea name="m6" required></textarea>
                <label>7. Comment contribues-tu à instaurer un climat sain dans une communauté ?</label>
                <textarea name="m7" required></textarea>
            </div>

            <div class="glass-card">
                <div class="group-title">III. ANALYSE & GESTION</div>
                <label>8. Un membre influent enfreint le règlement. Quelle stratégie adoptes-tu ?</label>
                <textarea name="m8" required></textarea>
                <label>9. Deux membres se provoquent mutuellement. Comment établis-tu les responsabilités ?</label>
                <textarea name="m9" required></textarea>
                <label>10. Un membre conteste publiquement une sanction. Comment gères-tu cela ?</label>
                <textarea name="m10" required></textarea>
                <label>11. Une vague de raid survient la nuit. Quelles sont tes mesures d’urgence ?</label>
                <textarea name="m11" required></textarea>
                <label>12. Un modérateur abuse de ses permissions. Quelle est ta réaction ?</label>
                <textarea name="m12" required></textarea>
            </div>

            <div class="glass-card">
                <div class="group-title">IV. POSTURE & ÉTHIQUE</div>
                <label>13. Comment maintiens-tu ton objectivité face à la pression ?</label>
                <textarea name="m13" required></textarea>
                <label>14. Comment différencies-tu un troll d’un membre réellement problématique ?</label>
                <textarea name="m14" required></textarea>
                <label>15. Penses-tu que la fermeté doit primer sur la pédagogie ?</label>
                <textarea name="m15" required></textarea>
                <label>16. Définis le principe d’impartialité dans la modération.</label>
                <textarea name="m16" required></textarea>
                <label>17. Si un ami proche enfreint le règlement, quelle est ta démarche ?</label>
                <textarea name="m17" required></textarea>
                <label>18. Comment éviter les biais personnels dans tes décisions ?</label>
                <textarea name="m18" required></textarea>
            </div>

            <div class="glass-card">
                <div class="group-title">V. TECHNIQUE & STRATÉGIE</div>
                <label>19. Explique le fonctionnement des sanctions progressives (warn → mute → kick → ban).</label>
                <textarea name="m19" required></textarea>
                <label>20. Décris le rôle des logs et leur importance.</label>
                <textarea name="m20" required></textarea>
                <label>21. As-tu déjà configuré un bot de modération ? (Détails).</label>
                <textarea name="m21" required></textarea>
                <label>22. Quelles améliorations structurelles proposerais-tu pour l'équipe ?</label>
                <textarea name="m22" required></textarea>
            </div>

            <button type="submit" class="submit-btn">SOUMETTRE CANDIDATURE DIVINE</button>
        </form>
    </div>

    <div id="section-anim" class="form-content">
        <form action="https://formspree.io/f/xnjbrvez" method="POST">
            <input type="hidden" name="Candidature" value="ANIMATEUR">
            
            <div class="glass-card">
                <label>Pseudo Discord & Âge</label>
                <input type="text" name="identite" required placeholder="Brook#1234 (20 ans)">
            </div>

            <div class="glass-card">
                <div class="group-title">INFOS & MOTIVATION</div>
                <label>1. Depuis combien de temps es-tu sur le serveur ?</label>
                <input type="text" name="a1" required>
                <label>2. Tes expériences passées en tant qu'animateur ?</label>
                <textarea name="a2" required></textarea>
                <label>3. Pourquoi souhaites-tu devenir animateur ici ?</label>
                <textarea name="a3" required></textarea>
                <label>4. Quelles qualités penses-tu apporter ?</label>
                <textarea name="a4" required></textarea>
                <label>5. Réaction face à un membre irrespectueux en event ?</label>
                <textarea name="a5" required></textarea>
                <label>6. Préfères-tu travailler seul ou en équipe ? Pourquoi ?</label>
                <textarea name="a6" required></textarea>
                <label>7. Comment gères-tu le stress ou les situations conflictuelles ?</label>
                <textarea name="a7" required></textarea>
                <label>8. Un animateur a-t-il le droit d’utiliser ses permissions hors event ?</label>
                <textarea name="a8" required></textarea>
            </div>

            <div class="glass-card">
                <div class="group-title">CRÉATIVITÉ & RÉACTIVITÉ</div>
                <label>9. Quels types d’événements pourrais-tu proposer ?</label>
                <textarea name="a9" required></textarea>
                <label>10. Propose une idée d’animation originale détaillée.</label>
                <textarea name="a10" required></textarea>
                <label>11. Si tu devais créer un petit événement rapide pour les membres, que ferais-tu ?</label>
                <textarea name="a11" required></textarea>
                <label>12. Selon toi, qu’est-ce qui rend une animation réussie ?</label>
                <textarea name="a12" required></textarea>
                <label>13. Rédige une annonce complète pour un jeu (date, règles, etc.).</label>
                <textarea name="a13" rows="5" required></textarea>
                <label>14. Réaction si deux membres se disputent pendant un événement ?</label>
                <textarea name="a14" required></textarea>
            </div>

            <div class="glass-card">
                <div class="group-title">LOGISTIQUE & TECHNIQUE</div>
                <label>15. Tes disponibilités pour organiser des événements ?</label>
                <input type="text" name="a15" required>
                <label>16. Un membre spam dans le chat pendant un événement, que fais-tu ?</label>
                <textarea name="a16" required></textarea>
                <label>17. Ton événement échoue (bug ou manque de gens), comment réagis-tu ?</label>
                <textarea name="a17" required></textarea>
                <label>18. Tu remarques qu’un autre animateur ne suit pas les règles, que fais-tu ?</label>
                <textarea name="a18" required></textarea>
                <label>19. Comment annoncer une info importante de façon engageante ?</label>
                <textarea name="a19" required></textarea>
                <label>20. Sais-tu utiliser les commandes de bots pour animer (giveaway, mini-jeux) ?</label>
                <textarea name="a20" required></textarea>
                <label>21. Sais-tu gérer les salons vocaux et textuels pendant un événement ?</label>
                <textarea name="a21" required></textarea>
            </div>

            <button type="submit" class="submit-btn">POSTULER POUR L'AMBIANCE G5</button>
        </form>
    </div>

    <footer>DYNASTY FAMILY’S © 2026</footer>
</div>

<script>
    function showForm(type) {
        const modSection = document.getElementById('section-mod');
        const animSection = document.getElementById('section-anim');
        const modBtn = document.getElementById('btn-mod');
        const animBtn = document.getElementById('btn-anim');

        if (type === 'mod') {
            modSection.classList.add('active');
            animSection.classList.remove('active');
            modBtn.classList.add('active');
            animBtn.classList.remove('active');
        } else {
            animSection.classList.add('active');
            modSection.classList.remove('active');
            animBtn.classList.add('active');
            modBtn.classList.remove('active');
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
