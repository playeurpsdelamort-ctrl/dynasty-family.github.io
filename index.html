<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynasty Family’s - Recrutement</title>
    <style>
        :root { 
            --accent: #38bdf8; 
            --accent-glow: rgba(56, 189, 248, 0.4);
            --bg: #020617; 
            --card: rgba(15, 23, 42, 0.9);
            --border: rgba(56, 189, 248, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: radial-gradient(circle at top right, #1e293b 0%, var(--bg) 100%); 
            color: #f1f5f9; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 10px; min-height: 100vh;
        }

        .container { 
            width: 100%; max-width: 850px; margin: 10px auto;
            background: var(--card); backdrop-filter: blur(20px); 
            padding: 30px 20px; border-radius: 28px; 
            border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .logo { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--accent); box-shadow: 0 0 25px var(--accent-glow); object-fit: cover; }
        h1 { color: var(--accent); font-size: 1.6rem; text-transform: uppercase; letter-spacing: 4px; margin: 15px 0 5px; font-weight: 900; }
        .subtitle { color: #94a3b8; font-size: 0.85rem; margin-bottom: 25px; }

        .tab-switcher {
            display: flex; background: rgba(0, 0, 0, 0.5); padding: 6px; 
            border-radius: 18px; margin-bottom: 30px; gap: 5px; border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1; padding: 14px 5px; border: none; background: transparent; 
            color: #64748b; cursor: pointer; font-weight: 800; border-radius: 12px; 
            font-size: 0.75rem; transition: 0.3s; text-transform: uppercase;
        }

        .tab-btn.active { background: var(--accent); color: #020617; box-shadow: 0 4px 15px var(--accent-glow); }

        .form-content { display: none; animation: fadeIn 0.5s ease; }
        .form-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .group-title { 
            color: var(--accent); font-size: 0.85rem; font-weight: 900; 
            text-transform: uppercase; margin: 40px 0 15px; 
            border-left: 4px solid var(--accent); padding-left: 12px;
            background: rgba(56, 189, 248, 0.05); padding-top: 8px; padding-bottom: 8px;
        }

        label { display: block; margin-top: 25px; margin-bottom: 10px; font-size: 0.95rem; color: #e2e8f0; font-weight: 600; line-height: 1.4; }
        input, textarea { 
            width: 100%; padding: 15px; background: rgba(15, 23, 42, 0.7); 
            border: 1px solid #334155; color: #fff; border-radius: 14px; 
            font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--accent); background: rgba(30, 41, 59, 0.9); }

        ::placeholder { color: #475569; font-style: italic; font-size: 0.85rem; }

        .submit-btn { 
            width: 100%; padding: 22px; background: var(--accent); border: none; 
            color: #020617; font-weight: 900; border-radius: 18px; cursor: pointer; 
            text-transform: uppercase; font-size: 1.1rem; margin-top: 40px;
        }

        footer { text-align: center; margin-top: 40px; color: #475569; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" alt="Logo" class="logo">
        <h1>𝘿𝙮𝙣𝙖𝙨𝙩𝙮 𝙁𝙖𝙢𝙞𝙡𝙮’𝙨</h1>
        <p class="subtitle">⚓ Recrutement Officiel de l'Équipage ⚓</p>
    </div>

    <div class="tab-switcher">
        <button class="tab-btn active" id="btn-mod" onclick="switchTab('mod')">Modérateur</button>
        <button class="tab-btn" id="btn-anim" onclick="switchTab('anim')">Animateur</button>
        <button class="tab-btn" id="btn-part" onclick="switchTab('part')">Partenaire</button>
    </div>

    <form id="form-mod" class="form-content active" action="https://formspree.io/f/xnjbrvez" method="POST">
        <input type="hidden" name="_subject" value="Candidature MODÉRATEUR">
        <label>Pseudo Discord & Âge</label>
        <input type="text" name="identité" required placeholder="Ex: Zoro#1234 (19 ans)">
        <div class="group-title">I. Parcours & Expérience</div>
        <label>1. Présente ton parcours sur Discord de manière détaillée.</label>
        <textarea name="m1" required placeholder="Ancienneté, serveurs fréquentés, rôles occupés..."></textarea>
        <button type="submit" class="submit-btn">Postuler Modération</button>
    </form>

    <form id="form-anim" class="form-content" action="https://formspree.io/f/xnjbrvez" method="POST">
        <input type="hidden" name="_subject" value="Candidature ANIMATEUR">
        
        <label>Pseudo Discord & Âge</label>
        <input type="text" name="identité" required placeholder="Ex: Brook#4321 (20 ans)">

        <div class="group-title">Informations générales</div>
        <label>Depuis combien de temps es-tu sur le serveur ?</label>
        <input type="text" name="a1" required placeholder="Ex: Depuis 4 mois environ">

        <label>As-tu déjà été animateur sur un autre serveur ? Si oui, explique ton rôle et ce que tu faisais exactement.</label>
        <textarea name="a2" required placeholder="Ex: Oui, j'organisais des soirées Blind Test et des concours de dessin..."></textarea>

        <div class="group-title">Motivation et personnalité</div>
        <label>Pourquoi souhaites-tu devenir animateur ici ?</label>
        <textarea name="a3" required placeholder="Ex: J'adore l'énergie du serveur et je veux créer des moments fun pour les membres..."></textarea>

        <label>Quelles qualités penses-tu apporter à notre serveur en tant qu’animateur ?</label>
        <textarea name="a4" required placeholder="Ex: Dynamisme, créativité, bonne humeur et ponctualité..."></textarea>

        <label>Comment réagirais-tu face à un membre irrespectueux ou qui enfreint les règles ?</label>
        <textarea name="a5" required placeholder="Ex: Je reste calme, je fais un rappel oral, si ça continue je fais appel à la modération..."></textarea>

        <label>Préfères-tu travailler seul ou en équipe ? Pourquoi ?</label>
        <textarea name="a6" required placeholder="Ex: En équipe, car à plusieurs on a de meilleures idées et on gère mieux le chat..."></textarea>

        <label>Comment gères-tu le stress ou les situations conflictuelles ?</label>
        <textarea name="a7" required placeholder="Ex: Je prends du recul et j'essaie de désamorcer par l'humour ou la discussion calme..."></textarea>

        <label>Pour toi, un animateur a-t-il le droit d’utiliser ses permissions en dehors des events ?</label>
        <textarea name="a8" required placeholder="Ex: Non, les permissions sont des outils de travail, pas des jouets personnels..."></textarea>

        <div class="group-title">Connaissance du serveur / créativité</div>
        <label>Quels types d’événements ou d’animations pourrais-tu proposer ?</label>
        <textarea name="a9" required placeholder="Ex: Quiz culture G, Loup-Garou, Tournois de jeux mobiles..."></textarea>

        <label>Propose une idée d’animation originale que tu pourrais organiser.</label>
        <textarea name="a10" required placeholder="Ex: Une chasse au trésor géante à travers les différents salons du serveur..."></textarea>

        <label>Si tu devais créer un petit événement rapide pour les membres, que ferais-tu ?</label>
        <textarea name="a11" required placeholder="Ex: Un quiz flash de 5 questions avec un petit rôle à la clé..."></textarea>

        <label>Selon toi, qu’est-ce qui rend une animation réussie ?</label>
        <textarea name="a12" required placeholder="Ex: La participation active des membres et l'absence d'imprévus techniques..."></textarea>

        <label>Crée-nous une annonce complète pour un jeu de ton choix (date, heure, jeu, description, règles, etc.).</label>
        <textarea name="a13" rows="6" required placeholder="📢 ÉVÉNEMENT : BLIND TEST !
Date : Samedi à 21h
Lieu : Salon Vocal Scène..."></textarea>

        <div class="group-title">Gestion et réactivité</div>
        <label>Comment réagirais-tu si deux membres se disputaient pendant un événement ?</label>
        <textarea name="a14" required placeholder="Ex: Je les sors du salon vocal pour discuter au calme et ne pas gâcher l'event..."></textarea>

        <label>Serais-tu disponible pour organiser des événements régulièrement ? Si oui, quand ?</label>
        <input type="text" name="a15" required placeholder="Ex: Oui, tous les mercredis soirs et les week-ends">

        <label>Un membre spam dans le chat pendant un événement, que fais-tu ?</label>
        <textarea name="a16" required placeholder="Ex: Je lui demande d'arrêter, si il persiste je demande un mute temporaire à la modération..."></textarea>

        <label>Un événement que tu as organisé échoue à cause d’un bug ou d’un manque de participants, comment réagis-tu ?</label>
        <textarea name="a17" required placeholder="Ex: Je reste positif, j'improvise une mini-discussion et j'analyse l'échec pour la prochaine fois..."></textarea>

        <label>Tu remarques qu’un autre animateur ne suit pas les règles, que fais-tu ?</label>
        <textarea name="a18" required placeholder="Ex: Je lui fais la remarque en privé. Si ça continue, j'en parle au responsable Staff..."></textarea>

        <label>Tu dois annoncer une information importante à tous les membres, comment le fais-tu de façon claire et engageante ?</label>
        <textarea name="a19" required placeholder="Ex: En utilisant des emojis, une mise en forme propre (gras/souligné) et un ton dynamique..."></textarea>

        <div class="group-title">Compétences techniques</div>
        <label>Sais-tu utiliser les commandes de bots pour animer (giveaway, sondages, mini-jeux) ?</label>
        <textarea name="a20" required placeholder="Ex: Oui, je maîtrise GiveawayBot et les commandes de sondage simples..."></textarea>

        <label>Sais-tu gérer les salons vocaux et textuels pendant un événement ?</label>
        <textarea name="a21" required placeholder="Ex: Oui, je sais gérer les limites de membres et les permissions de parole..."></textarea>

        <button type="submit" class="submit-btn">Postuler Animation</button>
    </form>

    <form id="form-part" class="form-content" action="https://formspree.io/f/xnjbrvez" method="POST">
        <input type="hidden" name="_subject" value="Demande de PARTENARIAT">
        <div class="group-title">Votre Projet</div>
        <label>Nom & Lien du serveur</label>
        <input type="text" name="p1" required placeholder="Ex: One Piece World (discord.gg/invite)">
        <button type="submit" class="submit-btn">Envoyer</button>
    </form>

    <footer>DYNASTY FAMILY’S © 2026</footer>
</div>

<script>
    function switchTab(type) {
        document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(type === 'mod') { document.getElementById('form-mod').classList.add('active'); document.getElementById('btn-mod').classList.add('active'); }
        else if(type === 'anim') { document.getElementById('form-anim').classList.add('active'); document.getElementById('btn-anim').classList.add('active'); }
        else { document.getElementById('form-part').classList.add('active'); document.getElementById('btn-part').classList.add('active'); }
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
