<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dynasty Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 20px; }
        .role-btn { background: rgba(0,0,0,0.4); border: 1px solid var(--gold); padding: 20px; border-radius: 15px; color: white; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .role-btn:hover { background: var(--gold); color: black; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div id="star-field"></div>
    <div class="container">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo">
        <h1>Dynasty Hub</h1>
        <p>Bienvenue, <span id="user-display" style="color:var(--gold)"></span></p>
        
        <div class="glass-card">
            <div class="grid">
                <a href="modo-test.html" class="role-btn">🛡️ Modo</a>
                <a href="bot-manager.html" class="role-btn">🤖 Bot Mgr</a>
                <a href="middleman.html" class="role-btn">🤝 Middleman</a>
                <a href="animateur.html" class="role-btn">🎉 Anim</a>
            </div>
            <a href="index.html" class="staff-link">Quitter</a>
        </div>
    </div>
    <script src="script-stars.js"></script>
    <script>document.getElementById('user-display').innerText = localStorage.getItem('user');</script>
</body>
</html>
