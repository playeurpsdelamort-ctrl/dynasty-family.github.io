<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub - Dynasty Family's</title>
    <style>
        body { margin: 0; background: #050a18; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px 0; }
        .container { width: 90%; max-width: 900px; text-align: center; }
        .logo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #ff8c00; margin-top: 20px; }
        h1 { color: #ff8c00; font-style: italic; text-transform: uppercase; margin: 15px 0 5px 0; font-size: 1.8rem; }
        .user-tag { color: #ff8c00; font-weight: bold; margin-bottom: 30px; display: block; opacity: 0.8; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: rgba(13,20,38,0.9); border: 1px solid rgba(255,140,0,0.2); border-radius: 15px; padding: 25px; text-decoration: none; color: white; transition: 0.3s; }
        .card:active { background: rgba(255,140,0,0.1); border-color: #ff8c00; }
        .card h2 { color: #ff8c00; margin: 10px 0; font-size: 1.2rem; }
        .card p { font-size: 0.85rem; color: #94a3b8; margin: 0; }
        .icon { font-size: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo">
        <h1>Portail Staff</h1>
        <span class="user-tag" id="user">Candidat : ...</span>
        <div class="grid">
            <a href="moderateur.html" class="card"><div class="icon">🛡️</div><h2>Modérateur</h2><p>Gestion, sanctions et discipline.</p></a>
            <a href="animateur.html" class="card"><div class="icon">🎉</div><h2>Animateur</h2><p>Événements et ambiance.</p></a>
            <a href="middleman.html" class="card"><div class="icon">🤝</div><h2>Middleman</h2><p>Sécurisation des trades Blox Fruits.</p></a>
            <a href="bot-manager.html" class="card"><div class="icon">🤖</div><h2>Bot Manager</h2><p>Technique et configuration.</p></a>
        </div>
    </div>
    <script>document.getElementById('user').innerText = "Candidat : " + (localStorage.getItem('user') || "Anonyme");</script>
</body>
</html>
