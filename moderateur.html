<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Modérateur - Dynasty Family's</title>
    <style>
        :root { --primary: #ff8c00; --bg: #050a18; --card: #0d1426; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(255, 140, 0, 0.05), transparent 70%); pointer-events: none; }

        .header { text-align: center; margin: 40px 0; z-index: 1; padding: 0 15px; }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); box-shadow: 0 0 30px rgba(255, 140, 0, 0.4); margin-bottom: 20px; }
        .title { color: var(--primary); font-size: 2.2rem; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -1px; margin: 0; text-shadow: 0 0 20px rgba(255, 140, 0, 0.2); }
        .subtitle { color: #94a3b8; font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }

        .exam-card { width: 90%; max-width: 850px; background: var(--card); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); padding: clamp(25px, 5%, 50px); position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.6); margin-bottom: 50px; box-sizing: border-box; }
        
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 40px; position: relative; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px var(--primary); }

        .step { display: none; }
        .step.active { display: block; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .q-label { color: var(--primary); font-weight: 900; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        .q-text { font-size: clamp(1.1rem, 4vw, 1.35rem); font-weight: 700; margin-bottom: 30px; line-height: 1.5; color: #f8fafc; }
        
        textarea { width: 100%; height: 280px; background: rgba(0, 0, 0, 0.3); border: 2px solid rgba(255,255,255,0.05); border-radius: 12px; color: white; padding: 25px; font-size: 1.1rem; box-sizing: border-box; resize: none; transition: 0.3s; outline: none; }
        textarea:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.5); }

        .nav-btns { display: flex; gap: 15px; margin-top: 30px; }
        .btn-next { flex: 2; background: var(--primary); color: #000; border: none; padding: 22px; border-radius: 12px; font-size: 1.15rem; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
        .btn-prev { flex: 1; background: rgba(255,255,255,0.05); color: #fff; border: none; padding: 22px; border-radius: 12px; font-size: 1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; display: none; }
        
        .btn-next:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255, 140, 0, 0.4); }
        .btn-prev:hover { background: rgba(255,255,255,0.1); }
        
        .footer-link { color: rgba(255,255,255,0.2); text-decoration: none; font-size: 0.8rem; margin-bottom: 30px; transition: 0.3s; }
        .footer-link:hover { color: var(--primary); }

        @media (max-width: 600px) {
            .nav-btns { flex-direction: column; }
            .btn-prev { order: 2; }
            .btn-next { order: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo">
        <h1 class="title">CANDIDATURE MODÉRATEUR</h1>
        <div class="subtitle">DYNASTY FAMILY'S • DISCIPLINE & STRATÉGIE</div>
    </div>

    <div class="exam-card">
        <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
        <form action="https://api.web3forms.com/submit" method="POST" id="form">
            <input type="hidden" name="access_key" value="a8ed2428-2741-474c-82f8-1c5444211509">
            <input type="hidden" name="subject" value="Nouveau Dossier Modérateur Test">
            <input type="checkbox" name="botcheck" style="display: none;">
            <input type="hidden" name="Pseudo" id="hid-user">
            
            <div id="container"></div>

            <div class="nav-btns">
                <button type="button" class="btn-prev" id="prevBtn" onclick="move(-1)">RETOUR</button>
                <button type="button" class="btn-next" id="nextBtn" onclick="move(1)">SUIVANT</button>
            </div>
        </form>
    </div>

    <a href="hub.html" class="footer-link">Quitter l'examen</a>

    <script>
        const questions = [
            { cat: "I. Parcours & Expérience", q: "1. Présente ton parcours sur Discord de manière détaillée (ancienneté, types de serveurs fréquentés, rôles occupés, responsabilités assumées)." },
            { cat: "I. Parcours & Expérience", q: "2. Décris une expérience concrète de modération difficile que tu as vécue et explique les décisions stratégiques que tu as prises." },
            { cat: "I. Parcours & Expérience", q: "3. As-tu déjà participé à l’élaboration ou à l’amélioration d’un règlement ? Si oui, explique ta méthodologie." },
            { cat: "II. Motivation & Vision", q: "4. Quelle est ta conception du rôle de modérateur au sein d’une communauté structurée ?" },
            { cat: "II. Motivation & Vision", q: "5. En quoi ta candidature se distingue-t-elle des autres ?" },
            { cat: "II. Motivation & Vision", q: "6. Quelle est, selon toi, la frontière entre autorité légitime et abus de pouvoir ?" },
            { cat: "II. Motivation & Vision", q: "7. Comment contribues-tu à instaurer un climat sain et durable dans une communauté en ligne ?" },
            { cat: "III. Analyse & Gestion de situations", q: "8. Un membre influent (ancien du serveur) enfreint volontairement le règlement. Quelle stratégie adoptes-tu ?" },
            { cat: "III. Analyse & Gestion de situations", q: "9. Deux membres se provoquent mutuellement, mais aucun ne semble innocent. Comment établis-tu les responsabilités ?" },
            { cat: "III. Analyse & Gestion de situations", q: "10. Un membre conteste publiquement une sanction appliquée. Comment gères-tu la situation sans perdre en crédibilité ?" },
            { cat: "III. Analyse & Gestion de situations", q: "11. Une vague de raid survient en pleine nuit. Explique précisément les mesures d’urgence que tu prends." },
            { cat: "III. Analyse & Gestion de situations", q: "12. Un modérateur abuse de ses permissions. Quelle est ta réaction et pourquoi ?" },
            { cat: "IV. Gestion émotionnelle", q: "13. Comment maintiens-tu ton objectivité face à la pression, aux critiques ou aux provocations ?" },
            { cat: "IV. Gestion émotionnelle", q: "14. Comment différencies-tu un simple troll d’un membre réellement problématique ?" },
            { cat: "IV. Gestion émotionnelle", q: "15. Penses-tu que la fermeté doit primer sur la pédagogie ? Argumente ta réponse." },
            { cat: "V. Impartialité & Éthique", q: "16. Définis le principe d’impartialité dans le cadre d’une modération professionnelle." },
            { cat: "V. Impartialité & Éthique", q: "17. Si un ami proche enfreint le règlement, quelle serait ta démarche exacte ?" },
            { cat: "V. Impartialité & Éthique", q: "18. Comment éviter les biais personnels dans la prise de décision ?" },
            { cat: "VI. Compétences techniques", q: "19. Explique le fonctionnement des sanctions progressives (warn → mute → kick → ban)." },
            { cat: "VI. Compétences techniques", q: "20. Décris le rôle des logs et pourquoi ils sont essentiels dans une modération professionnelle." },
            { cat: "VI. Compétences techniques", q: "21. As-tu déjà configuré un bot (automod, antiraid, etc.) ? Décris précisément tes actions." },
            { cat: "VII. Question stratégique finale", q: "22. Si tu étais responsable, quelles améliorations structurelles mettrais-tu en place pour optimiser l’efficacité de l’équipe ?" }
        ];

        document.getElementById('hid-user').value = localStorage.getItem('user') || "Anonyme";
        const cont = document.getElementById('container');
        
        questions.forEach((item, i) => {
            cont.innerHTML += `<div class="step">
                <span class="q-label">${item.cat} — QUESTION ${i+1} / ${questions.length}</span>
                <div class="q-text">${item.q}</div>
                <textarea name="Mod_Ans_Q${i+1}" placeholder="Réponse détaillée et argumentée..." required></textarea>
            </div>`;
        });

        let current = 0;
        const steps = document.querySelectorAll('.step');
        
        function show(idx) {
            steps.forEach((s, i) => s.classList.toggle('active', i === idx));
            document.getElementById('bar').style.width = ((idx + 1) / steps.length) * 100 + "%";
            document.getElementById('prevBtn').style.display = idx === 0 ? "none" : "block";
            document.getElementById('nextBtn').innerText = idx === steps.length - 1 ? 'SOUMETTRE MA CANDIDATURE' : 'SUIVANT';
        }

        function move(n) {
            if (n === 1 && !steps[current].querySelector('textarea').value.trim()) {
                return alert("Merci de fournir une réponse argumentée pour continuer.");
            }
            current += n;
            if (current >= steps.length) {
                document.getElementById('form').submit();
            } else {
                show(current);
            }
        }
        show(0);
    </script>
</body>
</html>
