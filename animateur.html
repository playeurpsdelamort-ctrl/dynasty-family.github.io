<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Animateur - Dynasty Family's</title>
    <style>
        :root { --primary: #ff8c00; --bg: #050a18; --card: #0d1426; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(255, 140, 0, 0.05), transparent 70%); pointer-events: none; }

        .header { text-align: center; margin: 40px 0; z-index: 1; }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); box-shadow: 0 0 30px rgba(255, 140, 0, 0.4); margin-bottom: 20px; }
        .title { color: var(--primary); font-size: 2.2rem; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -1px; margin: 0; text-shadow: 0 0 20px rgba(255, 140, 0, 0.2); }
        .subtitle { color: #94a3b8; font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }

        .exam-card { width: 90%; max-width: 850px; background: var(--card); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); padding: 50px; position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.6); margin-bottom: 50px; }
        
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 40px; position: relative; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px var(--primary); }

        .step { display: none; }
        .step.active { display: block; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .q-label { color: var(--primary); font-weight: 900; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        .q-text { font-size: 1.35rem; font-weight: 700; margin-bottom: 30px; line-height: 1.5; color: #f8fafc; }
        
        textarea { width: 100%; height: 280px; background: rgba(0, 0, 0, 0.3); border: 2px solid rgba(255,255,255,0.05); border-radius: 12px; color: white; padding: 25px; font-size: 1.1rem; box-sizing: border-box; resize: none; transition: 0.3s; outline: none; }
        textarea:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.5); }

        .btn-next { width: 100%; background: var(--primary); color: #000; border: none; padding: 22px; border-radius: 12px; font-size: 1.15rem; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 30px; transition: 0.3s; letter-spacing: 1px; }
        .btn-next:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255, 140, 0, 0.4); }
        
        .footer-link { color: rgba(255,255,255,0.2); text-decoration: none; font-size: 0.8rem; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo">
        <h1 class="title">CANDIDATURE ANIMATEUR</h1>
        <div class="subtitle">DYNASTY FAMILY'S • DISCIPLINE & STRATÉGIE</div>
    </div>

    <div class="exam-card">
        <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
        <form action="https://api.web3forms.com/submit" method="POST" id="form">
            <input type="hidden" name="access_key" value="TA_CLE_ICI">
            <input type="hidden" name="Pseudo" id="hid-user">
            <input type="hidden" name="Subject" value="Nouvelle Candidature Animateur">
            
            <div id="container"></div>
            <button type="button" class="btn-next" id="nextBtn" onclick="move(1)">SUIVANT</button>
        </form>
    </div>

    <a href="hub.html" class="footer-link">Quitter l'examen</a>

    <script>
        const questions = [
            { cat: "Informations générales", q: "Depuis combien de temps es-tu sur le serveur ?" },
            { cat: "Informations générales", q: "As-tu déjà été animateur sur un autre serveur ? Si oui, explique ton rôle et ce que tu faisais exactement." },
            { cat: "Motivation et personnalité", q: "Pourquoi souhaites-tu devenir animateur ici ?" },
            { cat: "Motivation et personnalité", q: "Quelles qualités penses-tu apporter à notre serveur en tant qu’animateur ?" },
            { cat: "Motivation et personnalité", q: "Comment réagirais-tu face à un membre irrespectueux ou qui enfreint les règles ?" },
            { cat: "Motivation et personnalité", q: "Préfères-tu travailler seul ou en équipe ? Pourquoi ?" },
            { cat: "Motivation et personnalité", q: "Comment gères-tu le stress ou les situations conflictuelles ?" },
            { cat: "Motivation et personnalité", q: "Pour toi, un animateur a-t-il le droit d’utiliser ses permissions en dehors des events ?" },
            { cat: "Connaissance du serveur / créativité", q: "Quels types d’événements ou d’animations pourrais-tu proposer ?" },
            { cat: "Connaissance du serveur / créativité", q: "Propose une idée d’animation originale que tu pourrais organiser." },
            { cat: "Connaissance du serveur / créativité", q: "Si tu devais créer un petit événement rapide pour les membres, que ferais-tu ?" },
            { cat: "Connaissance du serveur / créativité", q: "Qu’est-ce qui rend une animation réussie selon toi ?" },
            { cat: "Connaissance du serveur / créativité", q: "Crée-nous une annonce complète pour un jeu de ton choix (date, heure, jeu, description, règles, etc.)." },
            { cat: "Gestion et réactivité", q: "Comment réagirais-tu si deux membres se disputaient pendant un événement ?" },
            { cat: "Gestion et réactivité", q: "Serais-tu disponible pour organiser des événements régulièrement ? Si oui, quand ?" },
            { cat: "Gestion et réactivité", q: "Un membre spam dans le chat pendant un événement, que fais-tu ?" },
            { cat: "Gestion et réactivité", q: "Un événement que tu as organisé échoue à cause d’un bug ou d’un manque de participants, comment réagis-tu ?" },
            { cat: "Gestion et réactivité", q: "Tu remarques qu’un autre animateur ne suit pas les règles, que fais-tu ?" },
            { cat: "Gestion et réactivité", q: "Tu dois annoncer une information importante à tous les membres, comment le fais-tu de façon claire et engageante ?" },
            { cat: "Compétences techniques", q: "Sais-tu utiliser les commandes de bots pour animer le serveur (ex : giveaway, sondages, mini-jeux) ?" },
            { cat: "Compétences techniques", q: "Sais-tu gérer les salons vocaux et textuels pendant un événement ?" }
        ];

        document.getElementById('hid-user').value = localStorage.getItem('user') || "Anonyme";
        const cont = document.getElementById('container');
        
        questions.forEach((item, i) => {
            cont.innerHTML += `<div class="step">
                <span class="q-label">${item.cat.toUpperCase()} — QUESTION ${i+1} / ${questions.length}</span>
                <div class="q-text">${item.q}</div>
                <textarea name="Question_${i+1}" placeholder="Réponse détaillée et argumentée..." required></textarea>
            </div>`;
        });

        let current = 0;
        const steps = document.querySelectorAll('.step');
        function show(idx) {
            steps.forEach((s, i) => s.classList.toggle('active', i === idx));
            document.getElementById('bar').style.width = ((idx + 1) / steps.length) * 100 + "%";
            document.getElementById('nextBtn').innerText = idx === steps.length - 1 ? 'SOUMETTRE LA CANDIDATURE' : 'SUIVANT';
        }
        function move(n) {
            if (!steps[current].querySelector('textarea').value.trim()) return alert("Merci de remplir ta réponse avant de continuer.");
            current += n;
            if (current >= steps.length) document.getElementById('form').submit();
            else show(current);
        }
        show(0);
    </script>
</body>
</html>
