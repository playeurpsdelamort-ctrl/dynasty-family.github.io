<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Examen Anim - Dynasty Family's</title>
    <style>
        /* Même style que Modo pour la cohérence */
        body { margin: 0; background: #050a18; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .header { text-align: center; margin-bottom: 40px; }
        .logo { width: 80px; border-radius: 50%; border: 2px solid #ff8c00; }
        .title { color: #ff8c00; font-style: italic; text-transform: uppercase; margin-top: 10px; font-size: 24px; }
        .exam-card { width: 800px; background: rgba(13, 20, 38, 0.9); border-radius: 10px; border: 1px solid #333; padding: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .progress-bar { position: absolute; top: 0; left: 0; height: 4px; background: #ff8c00; width: 0%; transition: 0.3s; }
        .step { display: none; }
        .step.active { display: block; }
        .question-text { font-size: 20px; margin-bottom: 30px; font-weight: bold; border-left: 4px solid #ff8c00; padding-left: 20px; line-height: 1.4; }
        textarea { width: 100%; height: 250px; background: #000; border: 1px solid #333; border-radius: 5px; color: #fff; padding: 20px; font-size: 16px; box-sizing: border-box; resize: none; }
        .nav-btns { margin-top: 30px; display: flex; justify-content: space-between; }
        .btn { padding: 15px 40px; border-radius: 5px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-next { background: #ff8c00; color: #000; }
        .btn-prev { background: #222; color: #fff; }
    </style>
</head>
<body>
    <div class="header"><img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo"><div class="title">Candidature Animateur</div></div>
    <div class="exam-card">
        <div class="progress-bar" id="bar"></div>
        <form action="https://formspree.io/f/xnjbrvez" method="POST" id="form">
            <input type="hidden" name="Pseudo" id="hid-user"><input type="hidden" name="Poste" value="Animateur">
            <div id="container"></div>
            <div class="nav-btns">
                <button type="button" class="btn btn-prev" id="prev" onclick="move(-1)">Précédent</button>
                <button type="button" class="btn btn-next" id="next" onclick="move(1)">Suivant</button>
            </div>
        </form>
    </div>
    <script>
        const questions = ["Depuis quand es-tu sur le serveur ?","Animateur ailleurs ?","Pourquoi devenir animateur ?","Tes qualités ?","Membre irrespectueux ?","Solo ou équipe ?","Stress ?","Permissions hors event ?","Types d'events proposés ?","Idée originale ?","Event rapide chat ?","Animation réussie ?","Crée une annonce de jeu.","Dispute pendant l'event ?","Disponibilités ?","Spam pendant l'animation ?","Event qui échoue ?","Collègue fautif ?","Annonce engageante ?","Bots giveaway ?","Gestion vocale ?"];
        document.getElementById('hid-user').value = localStorage.getItem('user');
        const cont = document.getElementById('container');
        questions.forEach((q, i) => { cont.innerHTML += `<div class="step"><div class="question-text">${q}</div><textarea name="Q${i+1}" required></textarea></div>`; });
        let current = 0; const steps = document.querySelectorAll('.step');
        function show(idx) { steps.forEach((s, i) => s.classList.toggle('active', i === idx)); document.getElementById('bar').style.width = ((idx + 1) / steps.length) * 100 + "%"; document.getElementById('prev').style.visibility = idx === 0 ? 'hidden' : 'visible'; document.getElementById('next').innerText = idx === steps.length - 1 ? 'Envoyer' : 'Suivant'; }
        function move(n) { if (n === 1 && !steps[current].querySelector('textarea').value) return alert("Réponds d'abord !"); current += n; if (current >= steps.length) document.getElementById('form').submit(); else show(current); }
        show(0);
    </script>
</body>
</html>
