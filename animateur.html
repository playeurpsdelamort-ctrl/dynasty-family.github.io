<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Animateur - Dynasty Family's</title>
    <style>
        :root { --primary: #ff8c00; --bg: #050a18; --card: #0d1426; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Effet de particules/lueurs en arrière-plan */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(255, 140, 0, 0.05), transparent 70%); pointer-events: none; }

        .header { text-align: center; margin: 40px 0; z-index: 1; }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); box-shadow: 0 0 30px rgba(255, 140, 0, 0.4); margin-bottom: 20px; }
        .title { color: var(--primary); font-size: 2.2rem; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -1px; margin: 0; text-shadow: 0 0 20px rgba(255, 140, 0, 0.2); }
        .subtitle { color: #94a3b8; font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }

        .exam-card { width: 90%; max-width: 800px; background: var(--card); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); padding: 50px; position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.6); margin-bottom: 50px; }
        
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 40px; position: relative; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px var(--primary); }

        .step { display: none; }
        .step.active { display: block; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .q-label { color: var(--primary); font-weight: 900; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        .q-text { font-size: 1.4rem; font-weight: 700; margin-bottom: 30px; line-height: 1.4; color: #f8fafc; }
        
        textarea { width: 100%; height: 250px; background: rgba(0, 0, 0, 0.3); border: 2px solid rgba(255,255,255,0.05); border-radius: 12px; color: white; padding: 25px; font-size: 1.1rem; box-sizing: border-box; resize: none; transition: 0.3s; outline: none; }
        textarea:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.5); }

        .btn-next { width: 100%; background: var(--primary); color: #000; border: none; padding: 20px; border-radius: 12px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 30px; transition: 0.3s; letter-spacing: 1px; }
        .btn-next:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255, 140, 0, 0.4); }
        
        .footer-link { color: rgba(255,255,255,0.2); text-decoration: none; font-size: 0.8rem; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo">
        <h1 class="title">CANDIDATURE ANIMATEUR</h1>
        <div class="subtitle">DYNASTY FAMILY'S • AMBIANCE & CRÉATIVITÉ</div>
    </div>

    <div class="exam-card">
        <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
        <form action="https://formspree.io/f/xnjbrvez" method="POST" id="form">
            <input type="hidden" name="Pseudo" id="hid-user">
            <input type="hidden" name="Poste" value="Animateur">
            <div id="container"></div>
            <button type="button" class="btn-next" id="nextBtn" onclick="move(1)">SUIVANT</button>
        </form>
    </div>

    <a href="#" class="footer-link">Quitter l'examen</a>

    <script>
        const questions = [
            "Présente ton expérience dans l'animation sur Discord (serveurs gérés, types d'événements organisés, nombre de participants).",
            "Quelles sont tes idées pour dynamiser les salons textuels de Dynasty Family's de manière quotidienne ?",
            "Décris une animation originale (hors giveaway classique) que tu souhaiterais organiser. Détaille les règles et le déroulement.",
            "Un événement vocal tourne mal : plusieurs personnes hurlent et ne respectent pas les consignes. Comment reprends-tu le contrôle ?",
            "Quelles sont tes disponibilités pour organiser des événements en soirée ou durant les week-ends ?"
        ];

        document.getElementById('hid-user').value = localStorage.getItem('user') || "Anonyme";
        const cont = document.getElementById('container');
        questions.forEach((q, i) => {
            cont.innerHTML += `<div class="step">
                <span class="q-label">QUESTION ${i+1} / ${questions.length}</span>
                <div class="q-text">${q}</div>
                <textarea name="Anim_Q${i+1}" placeholder="Réponse détaillée et argumentée..." required></textarea>
            </div>`;
        });

        let current = 0;
        const steps = document.querySelectorAll('.step');
        function show(idx) {
            steps.forEach((s, i) => s.classList.toggle('active', i === idx));
            document.getElementById('bar').style.width = ((idx + 1) / steps.length) * 100 + "%";
            document.getElementById('nextBtn').innerText = idx === steps.length - 1 ? 'ENVOYER LE DOSSIER' : 'SUIVANT';
        }
        function move(n) {
            if (!steps[current].querySelector('textarea').value.trim()) return alert("Merci de remplir ta réponse !");
            current += n;
            if (current >= steps.length) document.getElementById('form').submit();
            else show(current);
        }
        show(0);
    </script>
</body>
</html>
