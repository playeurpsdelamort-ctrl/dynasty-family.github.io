<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Examen Anim - Dynasty Family's</title>
    <style>
        body { margin: 0; background: #050a18; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .header { text-align: center; margin-bottom: 40px; }
        .logo { width: 80px; border-radius: 50%; border: 2px solid #ff8c00; }
        .title { color: #ff8c00; font-style: italic; text-transform: uppercase; margin-top: 10px; font-size: 24px; letter-spacing: 1px; }
        .exam-card { width: 800px; background: rgba(13, 20, 38, 0.9); border-radius: 10px; border: 1px solid #333; padding: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .progress-bar { position: absolute; top: 0; left: 0; height: 4px; background: #ff8c00; width: 0%; transition: 0.3s; }
        .step { display: none; }
        .step.active { display: block; }
        .question-text { font-size: 20px; margin-bottom: 30px; font-weight: bold; border-left: 4px solid #ff8c00; padding-left: 20px; line-height: 1.4; }
        textarea { width: 100%; height: 250px; background: #000; border: 1px solid #333; border-radius: 5px; color: #fff; padding: 20px; font-size: 16px; box-sizing: border-box; resize: none; outline: none; }
        textarea:focus { border-color: #ff8c00; }
        .nav-btns { margin-top: 30px; display: flex; justify-content: space-between; }
        .btn { padding: 15px 40px; border-radius: 5px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-next { background: #ff8c00; color: #000; }
        .btn-prev { background: #222; color: #fff; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo">
        <div class="title">Candidature Animateur</div>
    </div>
    <div class="exam-card">
        <div class="progress-bar" id="bar"></div>
        <form action="https://formspree.io/f/xnjbrvez" method="POST" id="form">
            <input type="hidden" name="Pseudo" id="hid-user">
            <input type="hidden" name="Poste" value="Animateur">
            <div id="container"></div>
            <div class="nav-btns">
                <button type="button" class="btn btn-prev" id="prev" onclick="move(-1)">Précédent</button>
                <button type="button" class="btn btn-next" id="next" onclick="move(1)">Suivant</button>
            </div>
        </form>
    </div>
    <script>
        const questions = [
            "Depuis quand es-tu sur le serveur ?",
            "As-tu déjà été animateur sur d'autres serveurs ? Si oui, lesquels ?",
            "Pourquoi souhaites-tu devenir animateur chez Dynasty Family's ?",
            "Quelles sont tes principales qualités pour ce poste ?",
            "Comment réagirais-tu face à un membre qui se montre irrespectueux lors d'un événement ?",
            "Préfères-tu travailler seul ou en équipe pour organiser une animation ?",
            "Sais-tu gérer ton stress lors d'événements avec beaucoup de monde ?",
            "Acceptes-tu de ne pas utiliser tes permissions à des fins personnelles hors événement ?",
            "Quels types d'événements proposes-tu (Jeux, tournois, concours, etc.) ?",
            "Donne une idée d'animation originale que tu aimerais mettre en place.",
            "Comment ferais-tu pour relancer l'activité si le chat devient inactif ?",
            "Quels sont, selon toi, les ingrédients d'une animation réussie ?",
            "Rédige un exemple d'annonce pour un événement (jeu de ton choix).",
            "Comment gères-tu une dispute entre deux joueurs pendant une animation ?",
            "Quelles sont tes disponibilités habituelles pour organiser des événements ?",
            "Comment gères-tu le spam ou le flood pendant une explication de règles ?",
            "Que fais-tu si une animation ne se déroule pas comme prévu ou échoue ?",
            "Si un collègue animateur ne respecte pas les règles, comment réagis-tu ?",
            "Comment rendrais-tu une annonce visuellement attirante pour les membres ?",
            "Maîtrises-tu les bots de giveaway et d'annonce ? (GiveawayBot, etc.)",
            "Comment gères-tu la prise de parole dans un salon vocal avec 20 personnes ?"
        ];

        document.getElementById('hid-user').value = localStorage.getItem('user') || "Anonyme";
        const cont = document.getElementById('container');
        questions.forEach((q, i) => {
            cont.innerHTML += `<div class="step">
                <div class="question-text">${q}</div>
                <textarea name="R_Anim_${i+1}" placeholder="Ta réponse ici..." required></textarea>
            </div>`;
        });

        let current = 0;
        const steps = document.querySelectorAll('.step');
        function show(idx) {
            steps.forEach((s, i) => s.classList.toggle('active', i === idx));
            document.getElementById('bar').style.width = ((idx + 1) / steps.length) * 100 + "%";
            document.getElementById('prev').style.visibility = idx === 0 ? 'hidden' : 'visible';
            document.getElementById('next').innerText = idx === steps.length - 1 ? 'Soumettre le dossier' : 'Suivant';
        }
        function move(n) {
            if (n === 1 && !steps[current].querySelector('textarea').value.trim()) return alert("Merci de répondre à la question.");
            current += n;
            if (current >= steps.length) document.getElementById('form').submit();
            else show(current);
        }
        show(0);
    </script>
</body>
</html>
