<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Animateur Test - Dynasty Family's</title>
    <style>
        /* DESIGN DYNASTY FAMILY'S */
        body {
            margin: 0;
            padding: 0;
            background-color: #050a18;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 40px);
            background-size: 400px 400px, 250px 250px;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logo-main {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #ff8c00;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.5);
            margin-bottom: 15px;
            object-fit: cover;
        }

        .main-title {
            color: #ff8c00;
            font-style: italic;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: 1px;
        }

        .glass-card {
            width: 100%;
            max-width: 800px;
            background: rgba(13, 20, 38, 0.95);
            border: 1px solid rgba(255, 140, 0, 0.2);
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            margin-top: 20px;
        }

        .progress-container {
            width: 100%;
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .progress-bar {
            height: 100%;
            background: #ff8c00;
            width: 0%;
            transition: 0.4s ease;
            box-shadow: 0 0 10px #ff8c00;
        }

        .step { display: none; animation: slideIn 0.4s ease; text-align: left; }
        .step.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .question-num { color: #ff8c00; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .question-text { font-size: 1.15rem; line-height: 1.5; margin-bottom: 20px; font-weight: 600; color: #f3f4f6; }

        textarea {
            width: 100%;
            min-height: 220px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            padding: 18px;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        textarea:focus { outline: none; border-color: #ff8c00; }

        .nav-btns { display: flex; justify-content: space-between; margin-top: 30px; gap: 15px; }
        .btn-nav { padding: 14px 28px; border-radius: 8px; font-weight: 900; cursor: pointer; transition: 0.3s; border: none; text-transform: uppercase; font-size: 0.85rem; }
        .btn-prev { background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
        .btn-next { background: #ff8c00; color: #000; flex-grow: 1; }
        .btn-next:hover { box-shadow: 0 0 20px rgba(255, 140, 0, 0.4); transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/playeurpsdelamort-ctrl/dynasty-family.github.io/main/dinastyfamilli.jpg" class="logo-main">
        <h1 class="main-title">Candidature Animateur Test</h1>
        <p style="color: #ff8c00; font-weight: bold; font-size: 0.8rem; margin: 5px 0 20px 0;">DYNASTY FAMILY'S • RECRUTEMENT STAFF</p>

        <div class="glass-card">
            <div class="progress-container"><div class="progress-bar" id="progress"></div></div>

            <form action="https://formspree.io/f/xnjbrvez" method="POST" id="exam-form">
                <input type="hidden" name="Pseudo_Discord" id="hidden-pseudo">
                <input type="hidden" name="Poste" value="Animateur Test">

                <div id="steps-container">
                    </div>

                <div class="nav-btns">
                    <button type="button" class="btn-nav btn-prev" id="prevBtn" onclick="changeStep(-1)" style="visibility: hidden;">Précédent</button>
                    <button type="button" class="btn-nav btn-next" id="nextBtn" onclick="changeStep(1)">Commencer</button>
                </div>
            </form>
        </div>
        <a href="hub.html" style="color: #64748b; text-decoration: none; margin-top: 20px; font-size: 0.75rem; opacity: 0.6;">Annuler et quitter</a>
    </div>

    <script>
        const questions = [
            // Informations générales
            "Depuis combien de temps es-tu sur le serveur ?",
            "As-tu déjà été animateur sur un autre serveur ? Si oui, explique ton rôle et ce que tu faisais exactement.",
            
            // Motivation et personnalité
            "Pourquoi souhaites-tu devenir animateur ici ?",
            "Quelles qualités penses-tu apporter à notre serveur en tant qu’animateur ?",
            "Comment réagirais-tu face à un membre irrespectueux ou qui enfreint les règles ?",
            "Préfères-tu travailler seul ou en équipe ? Pourquoi ?",
            "Comment gères-tu le stress ou les situations conflictuelles ?",
            "Pour toi, un animateur a-t-il le droit d’utiliser ses permissions en dehors des events ?",
            
            // Connaissance du serveur / créativité
            "Quels types d’événements ou d’animations pourrais-tu proposer ?",
            "Propose une idée d’animation originale que tu pourrais organiser.",
            "Si tu devais créer un petit événement rapide pour les membres, que ferais-tu ?",
            "Selon toi, qu’est-ce qui rend une animation réussie ?",
            "Crée-nous une annonce complète pour un jeu de ton choix (date, heure, jeu, description, règles, etc.).",
            
            // Gestion et réactivité
            "Comment réagirais-tu si deux membres se disputaient pendant un événement ?",
            "Serais-tu disponible pour organiser des événements régulièrement ? Si oui, quand ?",
            "Un membre spam dans le chat pendant un événement, que fais-tu ?",
            "Un événement que tu as organisé échoue à cause d’un bug ou d’un manque de participants, comment réagis-tu ?",
            "Tu remarques qu’un autre animateur ne suit pas les règles, que fais-tu ?",
            "Tu dois annoncer une information importante à tous les membres, comment le fais-tu de façon claire et engageante ?",
            
            // Compétences techniques
            "Sais-tu utiliser les commandes de bots pour animer le serveur (ex : giveaway, sondages, mini-jeux) ?",
            "Sais-tu gérer les salons vocaux et textuels pendant un événement ?"
        ];

        const container = document.getElementById('steps-container');
        document.getElementById('hidden-pseudo').value = localStorage.getItem('user') || "Anonyme";

        questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'step';
            div.innerHTML = `
                <span class="question-num">Question ${i + 1} / ${questions.length}</span>
                <div class="question-text">${q}</div>
                <textarea name="reponse_q${i+1}" placeholder="Répondre ici..." required></textarea>
            `;
            container.appendChild(div);
        });

        let currentStep = -1;
        const steps = document.querySelectorAll('.step');

        function changeStep(n) {
            if (n === 1 && currentStep >= 0) {
                const area = steps[currentStep].querySelector('textarea');
                if (!area.value.trim()) { alert("Merci de répondre à la question pour continuer."); return; }
            }

            if (currentStep >= 0) steps[currentStep].classList.remove('active');
            currentStep += n;

            if (currentStep >= steps.length) {
                document.getElementById('exam-form').submit();
                return;
            }

            steps[currentStep].classList.add('active');
            updateUI();
        }

        function updateUI() {
            const progress = ((currentStep + 1) / steps.length) * 100;
            document.getElementById('progress').style.width = progress + "%";
            document.getElementById('prevBtn').style.visibility = currentStep > 0 ? 'visible' : 'hidden';
            document.getElementById('nextBtn').innerText = currentStep === steps.length - 1 ? "Envoyer ma candidature" : (currentStep === -1 ? "Commencer" : "Suivant");
            if(currentStep === -1) changeStep(1);
        }
        updateUI();
    </script>
</body>
</html>
